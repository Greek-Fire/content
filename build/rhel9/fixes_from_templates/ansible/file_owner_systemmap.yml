# platform = multi_platform_all
# reboot = false
# strategy = configure
# complexity = low
# disruption = low
- name: Set the file_owner_systemmap_newown variable if represented by uid
  ansible.builtin.set_fact:
    file_owner_systemmap_newown: "0"

- name: Find /boot/ file(s) matching ^.*System\.map.*$
  ansible.builtin.command: 'find -P /boot/ -maxdepth 1 -type f  ! -user 0 -regextype posix-extended -regex "^.*System\.map.*$"'
  register: files_found
  changed_when: False
  failed_when: False
  check_mode: no

- name: Ensure owner on /boot/ file(s) matching ^.*System\.map.*$
  ansible.builtin.file:
    path: "{{ item }}"
    follow: false
    owner: "{{ file_owner_systemmap_newown }}"
    state: file
  with_items:
    - "{{ files_found.stdout_lines }}"



