# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the named_write_master_zones SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_named_write_master_zones)
- name: "Disable the named_write_master_zones SELinux Boolean - Set SELinux Boolean named_write_master_zones Accordingly"
  ansible.posix.seboolean:
    name: named_write_master_zones
    state: "{{ var_named_write_master_zones }}"
    persistent: yes
