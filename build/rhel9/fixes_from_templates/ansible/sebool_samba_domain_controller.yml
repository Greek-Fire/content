# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the samba_domain_controller SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_samba_domain_controller)
- name: "Disable the samba_domain_controller SELinux Boolean - Set SELinux Boolean samba_domain_controller Accordingly"
  ansible.posix.seboolean:
    name: samba_domain_controller
    state: "{{ var_samba_domain_controller }}"
    persistent: yes
