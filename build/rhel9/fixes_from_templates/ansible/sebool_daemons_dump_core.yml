# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the daemons_dump_core SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_daemons_dump_core)
- name: "Disable the daemons_dump_core SELinux Boolean - Set SELinux Boolean daemons_dump_core Accordingly"
  ansible.posix.seboolean:
    name: daemons_dump_core
    state: "{{ var_daemons_dump_core }}"
    persistent: yes
