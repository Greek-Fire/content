# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the tor_can_network_relay SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_tor_can_network_relay)
- name: "Disable the tor_can_network_relay SELinux Boolean - Set SELinux Boolean tor_can_network_relay Accordingly"
  ansible.posix.seboolean:
    name: tor_can_network_relay
    state: "{{ var_tor_can_network_relay }}"
    persistent: yes
