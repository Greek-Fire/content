# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the daemons_enable_cluster_mode SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_daemons_enable_cluster_mode)
- name: "Disable the daemons_enable_cluster_mode SELinux Boolean - Set SELinux Boolean daemons_enable_cluster_mode Accordingly"
  ansible.posix.seboolean:
    name: daemons_enable_cluster_mode
    state: "{{ var_daemons_enable_cluster_mode }}"
    persistent: yes
