# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the squid_use_tproxy SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_squid_use_tproxy)
- name: "Disable the squid_use_tproxy SELinux Boolean - Set SELinux Boolean squid_use_tproxy Accordingly"
  ansible.posix.seboolean:
    name: squid_use_tproxy
    state: "{{ var_squid_use_tproxy }}"
    persistent: yes
