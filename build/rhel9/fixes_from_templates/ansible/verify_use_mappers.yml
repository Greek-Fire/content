# platform = multi_platform_all
# reboot = false
# strategy = restrict
# complexity = low
# disruption = low

- name: "Verify that 'use_mappers' is set to 'pwent' in PAM"
  ansible.builtin.lineinfile:
    path: '/etc/pam_pkcs11/pam_pkcs11.conf'
    create: yes
    regexp: ''
    line: 'use_mappers = pwent'
    state: present