# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the irssi_use_full_network SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_irssi_use_full_network)
- name: "Disable the irssi_use_full_network SELinux Boolean - Set SELinux Boolean irssi_use_full_network Accordingly"
  ansible.posix.seboolean:
    name: irssi_use_full_network
    state: "{{ var_irssi_use_full_network }}"
    persistent: yes
