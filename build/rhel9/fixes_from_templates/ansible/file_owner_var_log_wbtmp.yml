# platform = multi_platform_all
# reboot = false
# strategy = configure
# complexity = low
# disruption = low
- name: Set the file_owner_var_log_wbtmp_newown variable if represented by uid
  ansible.builtin.set_fact:
    file_owner_var_log_wbtmp_newown: "0"

- name: Find /var/log/ file(s) matching .*(b|w)tmp((\.|-)[^\/]+)?$
  ansible.builtin.command: 'find -P /var/log/ -maxdepth 1 -type f  ! -user 0 -regextype posix-extended -regex ".*(b|w)tmp((\.|-)[^\/]+)?$"'
  register: files_found
  changed_when: False
  failed_when: False
  check_mode: no

- name: Ensure owner on /var/log/ file(s) matching .*(b|w)tmp((\.|-)[^\/]+)?$
  ansible.builtin.file:
    path: "{{ item }}"
    follow: false
    owner: "{{ file_owner_var_log_wbtmp_newown }}"
    state: file
  with_items:
    - "{{ files_found.stdout_lines }}"



