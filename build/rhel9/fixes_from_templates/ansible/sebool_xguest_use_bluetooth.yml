# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the xguest_use_bluetooth SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_xguest_use_bluetooth)
- name: "Disable the xguest_use_bluetooth SELinux Boolean - Set SELinux Boolean xguest_use_bluetooth Accordingly"
  ansible.posix.seboolean:
    name: xguest_use_bluetooth
    state: "{{ var_xguest_use_bluetooth }}"
    persistent: yes
