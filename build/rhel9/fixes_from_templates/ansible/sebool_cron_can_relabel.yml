# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the cron_can_relabel SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_cron_can_relabel)
- name: "Disable the cron_can_relabel SELinux Boolean - Set SELinux Boolean cron_can_relabel Accordingly"
  ansible.posix.seboolean:
    name: cron_can_relabel
    state: "{{ var_cron_can_relabel }}"
    persistent: yes
