# platform = multi_platform_rhel,multi_platform_fedora,multi_platform_ol,multi_platform_almalinux,multi_platform_rhv,multi_platform_ubuntu,multi_platform_sle,multi_platform_slmicro
# reboot = true
# strategy = disable
# complexity = low
# disruption = medium
- name: Ensure kernel module 'cfg80211' is disabled
  ansible.builtin.lineinfile:
    create: yes
    dest: "/etc/modprobe.d/cfg80211.conf"
    regexp: 'install\s+cfg80211'
    line: "install cfg80211 /bin/false"

- name: Ensure kernel module 'cfg80211' is blacklisted
  ansible.builtin.lineinfile:
    create: yes
    dest: "/etc/modprobe.d/cfg80211.conf"
    regexp: '^blacklist cfg80211$'
    line: "blacklist cfg80211"
