# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Enable the xend_run_qemu SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_xend_run_qemu)
- name: "Enable the xend_run_qemu SELinux Boolean - Set SELinux Boolean xend_run_qemu Accordingly"
  ansible.posix.seboolean:
    name: xend_run_qemu
    state: "{{ var_xend_run_qemu }}"
    persistent: yes
