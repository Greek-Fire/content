# platform = multi_platform_all
# reboot = false
# strategy = restrict
# complexity = low
# disruption = low

- name: "Ensure Password History Is Enforced for the Root User"
  ansible.builtin.lineinfile:
    path: '/etc/security/pwhistory.conf'
    create: yes
    regexp: ''
    line: 'enforce_for_root'
    state: present