# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Enable the mcelog_exec_scripts SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_mcelog_exec_scripts)
- name: "Enable the mcelog_exec_scripts SELinux Boolean - Set SELinux Boolean mcelog_exec_scripts Accordingly"
  ansible.posix.seboolean:
    name: mcelog_exec_scripts
    state: "{{ var_mcelog_exec_scripts }}"
    persistent: yes
