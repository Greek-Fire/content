# platform = multi_platform_all
# reboot = true
# strategy = disable
# complexity = low
# disruption = medium

- name: Disallow magic SysRq key - Set fact for sysctl paths
  ansible.builtin.set_fact:

    sysctl_paths:
      - "/etc/sysctl.d/"
      - "/run/sysctl.d/"
      - "/usr/local/lib/sysctl.d/"



- name: Disallow magic SysRq key - Find all files that contain kernel.sysrq
  ansible.builtin.shell:
    cmd: find -L {{ sysctl_paths | join(" ") }} -type f -name '*.conf' | xargs grep -HP '^\s*kernel.sysrq\s*=\s*.*$'
  register: find_all_values
  check_mode: false
  changed_when: false
  failed_when: false

- name: Disallow magic SysRq key - Find all files that set kernel.sysrq to correct value
  ansible.builtin.shell:
    cmd: find -L {{ sysctl_paths | join(" ") }} -type f -name '*.conf' | xargs grep -HP '^\s*kernel.sysrq\s*=\s*0$'
  register: find_correct_value
  check_mode: false
  changed_when: false
  failed_when: false

- name: Disallow magic SysRq key - Comment out any occurrences of kernel.sysrq from config files
  ansible.builtin.replace:
    path: '{{ item | split(":") | first }}'
    regexp: '^[\s]*kernel.sysrq'
    replace: '#kernel.sysrq'
  loop: '{{ find_all_values.stdout_lines }}'
  when: find_correct_value.stdout_lines | length == 0 or find_all_values.stdout_lines | length > find_correct_value.stdout_lines | length




- name: Disallow magic SysRq key - Comment out any occurrences of kernel.sysrq from /etc/sysctl.conf
  ansible.builtin.replace:
    path: "{{ item }}"
    regexp: '^[\s]*kernel.sysrq'
    replace: '#kernel.sysrq'
  with_fileglob:
    - "/etc/sysctl.conf"

- name: Disallow magic SysRq key - Ensure sysctl kernel.sysrq is set to 0
  ansible.posix.sysctl:
    name: "kernel.sysrq"
    value: "0"

    sysctl_file: "/etc/sysctl.d/kernel_sysrq.conf"

    state: present
    reload: yes