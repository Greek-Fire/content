# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the dhcpc_exec_iptables SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_dhcpc_exec_iptables)
- name: "Disable the dhcpc_exec_iptables SELinux Boolean - Set SELinux Boolean dhcpc_exec_iptables Accordingly"
  ansible.posix.seboolean:
    name: dhcpc_exec_iptables
    state: "{{ var_dhcpc_exec_iptables }}"
    persistent: yes
