# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Enable the sysadm_exec_content SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_sysadm_exec_content)
- name: "Enable the sysadm_exec_content SELinux Boolean - Set SELinux Boolean sysadm_exec_content Accordingly"
  ansible.posix.seboolean:
    name: sysadm_exec_content
    state: "{{ var_sysadm_exec_content }}"
    persistent: yes
