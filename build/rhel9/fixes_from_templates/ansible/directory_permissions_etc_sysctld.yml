# platform = multi_platform_all
# reboot = false
# strategy = configure
# complexity = low
# disruption = low









- name: Find /etc/sysctl.d/ file(s)
  ansible.builtin.command: 'find -P /etc/sysctl.d/ -maxdepth 0 -perm /u+s,g+ws,o+wt  -type d '
  register: files_found
  changed_when: False
  failed_when: False
  check_mode: no

- name: Set permissions for /etc/sysctl.d/ file(s)
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "u-s,g-ws,o-wt"
    state: "directory"
  with_items:
    - "{{ files_found.stdout_lines }}"


