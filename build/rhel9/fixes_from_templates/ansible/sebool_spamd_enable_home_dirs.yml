# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Enable the spamd_enable_home_dirs SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_spamd_enable_home_dirs)
- name: "Enable the spamd_enable_home_dirs SELinux Boolean - Set SELinux Boolean spamd_enable_home_dirs Accordingly"
  ansible.posix.seboolean:
    name: spamd_enable_home_dirs
    state: "{{ var_spamd_enable_home_dirs }}"
    persistent: yes
