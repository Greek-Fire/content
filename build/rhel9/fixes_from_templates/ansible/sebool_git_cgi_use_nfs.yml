# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the git_cgi_use_nfs SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_git_cgi_use_nfs)
- name: "Disable the git_cgi_use_nfs SELinux Boolean - Set SELinux Boolean git_cgi_use_nfs Accordingly"
  ansible.posix.seboolean:
    name: git_cgi_use_nfs
    state: "{{ var_git_cgi_use_nfs }}"
    persistent: yes
