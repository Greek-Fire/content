# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the abrt_handle_event SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_abrt_handle_event)
- name: "Disable the abrt_handle_event SELinux Boolean - Set SELinux Boolean abrt_handle_event Accordingly"
  ansible.posix.seboolean:
    name: abrt_handle_event
    state: "{{ var_abrt_handle_event }}"
    persistent: yes
