# platform = multi_platform_all
# reboot = false
# strategy = restrict
# complexity = low
# disruption = low





- name: Disable GSSAPI Authentication - Check if the parameter GSSAPIAuthentication is configured in /etc/ssh/sshd_config
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: (?i)^\s*{{ "GSSAPIAuthentication"| regex_escape }}\s+
    state: absent
  check_mode: true
  changed_when: false
  register: _config_file_has_parameter
- name: Disable GSSAPI Authentication - Check if the parameter GSSAPIAuthentication is configured in /etc/ssh/sshd_config.d
  ansible.builtin.find:
    paths:
    - /etc/ssh/sshd_config.d
    contains: (?i)^\s*{{ "GSSAPIAuthentication"| regex_escape }}\s+
  register: _config_dir_has_parameter
- name: Disable GSSAPI Authentication - Check if the parameter GSSAPIAuthentication is configured correctly in /etc/ssh/sshd_config
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: (?i)^\s*{{ "GSSAPIAuthentication"| regex_escape }}\s+no$
    state: absent
  check_mode: true
  changed_when: false
  register: _config_file_correctly
- name: Disable GSSAPI Authentication - Check if the parameter GSSAPIAuthentication is configured correctly in /etc/ssh/sshd_config.d
  ansible.builtin.find:
    paths:
    - /etc/ssh/sshd_config.d
    contains: (?i)^\s*{{ "GSSAPIAuthentication"| regex_escape }}\s+no$
  register: _config_dir_correctly
- name: 'Disable GSSAPI Authentication'
  block:
    - name: "Deduplicate values from /etc/ssh/sshd_config"
      ansible.builtin.lineinfile:
        path: '/etc/ssh/sshd_config'
        create: no
        regexp: '(?i)(?i)^\s*{{ "GSSAPIAuthentication"| regex_escape }}\s+'
        state: 'absent'
    
    - name: 'Check if /etc/ssh/sshd_config.d exists'
      ansible.builtin.stat:
        path: '/etc/ssh/sshd_config.d'
      register: '_etc_ssh_sshd_config_d_exists'
    
    - name: 'Check if the parameter GSSAPIAuthentication is present in /etc/ssh/sshd_config.d'
      ansible.builtin.find:
        paths: '/etc/ssh/sshd_config.d'
        recurse: 'yes'
        follow: 'no'
        contains: '(?i)^\s*{{ "GSSAPIAuthentication"| regex_escape }}\s+'
      register: '_etc_ssh_sshd_config_d_has_parameter'
      when: '_etc_ssh_sshd_config_d_exists.stat.isdir is defined and _etc_ssh_sshd_config_d_exists.stat.isdir'
    - name: "Remove parameter from files in /etc/ssh/sshd_config.d"
      ansible.builtin.lineinfile:
        path: '{{ item.path }}'
        create: no
        regexp: '(?i)(?i)^\s*{{ "GSSAPIAuthentication"| regex_escape }}\s+'
        state: 'absent'
      with_items: '{{ _etc_ssh_sshd_config_d_has_parameter.files | default([]) }}'
      when: '_etc_ssh_sshd_config_d_has_parameter.matched > 0'
    - name: "Insert correct line to /etc/ssh/sshd_config.d/01-complianceascode-reinforce-os-defaults.conf"
      ansible.builtin.lineinfile:
        path: '/etc/ssh/sshd_config.d/01-complianceascode-reinforce-os-defaults.conf'
        create: yes
        regexp: '(?i)(?i)^\s*{{ "GSSAPIAuthentication"| regex_escape }}\s+'
        line: 'GSSAPIAuthentication no'
        state: present
        insertbefore: 'BOF'
        validate: '/usr/sbin/sshd -t -f %s'
  when: (_config_file_correctly.found == 0 and _config_dir_correctly.matched == 0) or ((_config_file_has_parameter.found | int) + (_config_dir_has_parameter.matched | int)) != 1
- name: Disable GSSAPI Authentication - set file mode for /etc/ssh/sshd_config.d/01-complianceascode-reinforce-os-defaults.conf
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d/01-complianceascode-reinforce-os-defaults.conf
    mode: '0600'
    state: touch
    modification_time: preserve
    access_time: preserve