# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the pcp_read_generic_logs SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_pcp_read_generic_logs)
- name: "Disable the pcp_read_generic_logs SELinux Boolean - Set SELinux Boolean pcp_read_generic_logs Accordingly"
  ansible.posix.seboolean:
    name: pcp_read_generic_logs
    state: "{{ var_pcp_read_generic_logs }}"
    persistent: yes
