# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Enable the cron_userdomain_transition SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_cron_userdomain_transition)
- name: "Enable the cron_userdomain_transition SELinux Boolean - Set SELinux Boolean cron_userdomain_transition Accordingly"
  ansible.posix.seboolean:
    name: cron_userdomain_transition
    state: "{{ var_cron_userdomain_transition }}"
    persistent: yes
