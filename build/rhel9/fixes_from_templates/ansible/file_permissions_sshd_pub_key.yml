# platform = multi_platform_all
# reboot = false
# strategy = configure
# complexity = low
# disruption = low









- name: Find /etc/ssh/ file(s)
  ansible.builtin.command: 'find -P /etc/ssh/ -maxdepth 1 -perm /u+xs,g+xws,o+xwt  -type f -regextype posix-extended -regex "^.*\.pub$"'
  register: files_found
  changed_when: False
  failed_when: False
  check_mode: no

- name: Set permissions for /etc/ssh/ file(s)
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "u-xs,g-xws,o-xwt"
    state: "file"
  with_items:
    - "{{ files_found.stdout_lines }}"


