# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the httpd_tmp_exec SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_httpd_tmp_exec)
- name: "Disable the httpd_tmp_exec SELinux Boolean - Set SELinux Boolean httpd_tmp_exec Accordingly"
  ansible.posix.seboolean:
    name: httpd_tmp_exec
    state: "{{ var_httpd_tmp_exec }}"
    persistent: yes
