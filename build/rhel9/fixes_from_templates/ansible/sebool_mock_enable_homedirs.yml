# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the mock_enable_homedirs SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_mock_enable_homedirs)
- name: "Disable the mock_enable_homedirs SELinux Boolean - Set SELinux Boolean mock_enable_homedirs Accordingly"
  ansible.posix.seboolean:
    name: mock_enable_homedirs
    state: "{{ var_mock_enable_homedirs }}"
    persistent: yes
