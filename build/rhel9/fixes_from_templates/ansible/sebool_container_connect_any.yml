# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the container_connect_any SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_container_connect_any)
- name: "Disable the container_connect_any SELinux Boolean - Set SELinux Boolean container_connect_any Accordingly"
  ansible.posix.seboolean:
    name: container_connect_any
    state: "{{ var_container_connect_any }}"
    persistent: yes
