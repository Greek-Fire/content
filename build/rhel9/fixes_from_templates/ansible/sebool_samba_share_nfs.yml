# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the samba_share_nfs SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_samba_share_nfs)
- name: "Disable the samba_share_nfs SELinux Boolean - Set SELinux Boolean samba_share_nfs Accordingly"
  ansible.posix.seboolean:
    name: samba_share_nfs
    state: "{{ var_samba_share_nfs }}"
    persistent: yes
