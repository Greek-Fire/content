# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the tftp_home_dir SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_tftp_home_dir)
- name: "Disable the tftp_home_dir SELinux Boolean - Set SELinux Boolean tftp_home_dir Accordingly"
  ansible.posix.seboolean:
    name: tftp_home_dir
    state: "{{ var_tftp_home_dir }}"
    persistent: yes
