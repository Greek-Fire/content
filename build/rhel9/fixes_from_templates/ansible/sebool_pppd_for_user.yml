# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the pppd_for_user SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_pppd_for_user)
- name: "Disable the pppd_for_user SELinux Boolean - Set SELinux Boolean pppd_for_user Accordingly"
  ansible.posix.seboolean:
    name: pppd_for_user
    state: "{{ var_pppd_for_user }}"
    persistent: yes
