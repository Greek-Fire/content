# platform = multi_platform_all
# reboot = false
# strategy = disable
# complexity = low
# disruption = low

- name: "The Chronyd service is disabled - Disable service chronyd"
  block:
  - name: "The Chronyd service is disabled - Collect systemd Services Present in the System"
    ansible.builtin.command: systemctl -q list-unit-files --type service
    register: service_exists
    changed_when: false
    failed_when: service_exists.rc not in [0, 1]
    check_mode: false

  - name: "The Chronyd service is disabled - Ensure chronyd.service is Masked"
    ansible.builtin.systemd:
      name: "chronyd.service"
      state: "stopped"
      enabled: false
      masked: true
    when: 'service_exists.stdout_lines is search("chronyd.service", multiline=True)'

  - name: "Unit Socket Exists - chronyd.socket"
    ansible.builtin.command: systemctl -q list-unit-files chronyd.socket
    register: socket_file_exists
    changed_when: false
    failed_when: socket_file_exists.rc not in [0, 1]
    check_mode: false

  - name: "The Chronyd service is disabled - Disable Socket chronyd"
    ansible.builtin.systemd:
      name: "chronyd.socket"
      enabled: false
      state: "stopped"
      masked: true
    when: 'socket_file_exists.stdout_lines is search("chronyd.socket", multiline=True)'
  tags:
  - special_service_block