# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the use_lpd_server SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_use_lpd_server)
- name: "Disable the use_lpd_server SELinux Boolean - Set SELinux Boolean use_lpd_server Accordingly"
  ansible.posix.seboolean:
    name: use_lpd_server
    state: "{{ var_use_lpd_server }}"
    persistent: yes
