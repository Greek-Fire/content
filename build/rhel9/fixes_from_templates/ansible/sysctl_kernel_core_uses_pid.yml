# platform = multi_platform_all
# reboot = true
# strategy = disable
# complexity = low
# disruption = medium

- name: Configure file name of core dumps - Set fact for sysctl paths
  ansible.builtin.set_fact:

    sysctl_paths:
      - "/etc/sysctl.d/"
      - "/run/sysctl.d/"
      - "/usr/local/lib/sysctl.d/"



- name: Configure file name of core dumps - Find all files that contain kernel.core_uses_pid
  ansible.builtin.shell:
    cmd: find -L {{ sysctl_paths | join(" ") }} -type f -name '*.conf' | xargs grep -HP '^\s*kernel.core_uses_pid\s*=\s*.*$'
  register: find_all_values
  check_mode: false
  changed_when: false
  failed_when: false

- name: Configure file name of core dumps - Find all files that set kernel.core_uses_pid to correct value
  ansible.builtin.shell:
    cmd: find -L {{ sysctl_paths | join(" ") }} -type f -name '*.conf' | xargs grep -HP '^\s*kernel.core_uses_pid\s*=\s*0$'
  register: find_correct_value
  check_mode: false
  changed_when: false
  failed_when: false

- name: Configure file name of core dumps - Comment out any occurrences of kernel.core_uses_pid from config files
  ansible.builtin.replace:
    path: '{{ item | split(":") | first }}'
    regexp: '^[\s]*kernel.core_uses_pid'
    replace: '#kernel.core_uses_pid'
  loop: '{{ find_all_values.stdout_lines }}'
  when: find_correct_value.stdout_lines | length == 0 or find_all_values.stdout_lines | length > find_correct_value.stdout_lines | length




- name: Configure file name of core dumps - Comment out any occurrences of kernel.core_uses_pid from /etc/sysctl.conf
  ansible.builtin.replace:
    path: "{{ item }}"
    regexp: '^[\s]*kernel.core_uses_pid'
    replace: '#kernel.core_uses_pid'
  with_fileglob:
    - "/etc/sysctl.conf"

- name: Configure file name of core dumps - Ensure sysctl kernel.core_uses_pid is set to 0
  ansible.posix.sysctl:
    name: "kernel.core_uses_pid"
    value: "0"

    sysctl_file: "/etc/sysctl.d/kernel_core_uses_pid.conf"

    state: present
    reload: yes