# platform = multi_platform_all
# reboot = false
# strategy = restrict
# complexity = low
# disruption = low

- name: "Ensure PAM Enforces Password Requirements - Enforce for root User"
  ansible.builtin.lineinfile:
    path: '/etc/security/pwquality.conf'
    create: yes
    regexp: ''
    line: 'enforce_for_root'
    state: present