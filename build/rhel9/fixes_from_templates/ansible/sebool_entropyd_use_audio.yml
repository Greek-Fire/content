# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the entropyd_use_audio SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_entropyd_use_audio)
- name: "Disable the entropyd_use_audio SELinux Boolean - Set SELinux Boolean entropyd_use_audio Accordingly"
  ansible.posix.seboolean:
    name: entropyd_use_audio
    state: "{{ var_entropyd_use_audio }}"
    persistent: yes
