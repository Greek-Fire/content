# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the smartmon_3ware SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_smartmon_3ware)
- name: "Disable the smartmon_3ware SELinux Boolean - Set SELinux Boolean smartmon_3ware Accordingly"
  ansible.posix.seboolean:
    name: smartmon_3ware
    state: "{{ var_smartmon_3ware }}"
    persistent: yes
