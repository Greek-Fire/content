# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the sge_domain_can_network_connect SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_sge_domain_can_network_connect)
- name: "Disable the sge_domain_can_network_connect SELinux Boolean - Set SELinux Boolean sge_domain_can_network_connect Accordingly"
  ansible.posix.seboolean:
    name: sge_domain_can_network_connect
    state: "{{ var_sge_domain_can_network_connect }}"
    persistent: yes
