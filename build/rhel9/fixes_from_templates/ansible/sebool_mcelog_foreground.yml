# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the mcelog_foreground SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_mcelog_foreground)
- name: "Disable the mcelog_foreground SELinux Boolean - Set SELinux Boolean mcelog_foreground Accordingly"
  ansible.posix.seboolean:
    name: mcelog_foreground
    state: "{{ var_mcelog_foreground }}"
    persistent: yes
