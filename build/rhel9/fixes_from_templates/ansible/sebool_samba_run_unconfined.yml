# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the samba_run_unconfined SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_samba_run_unconfined)
- name: "Disable the samba_run_unconfined SELinux Boolean - Set SELinux Boolean samba_run_unconfined Accordingly"
  ansible.posix.seboolean:
    name: samba_run_unconfined
    state: "{{ var_samba_run_unconfined }}"
    persistent: yes
