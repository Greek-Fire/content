# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Enable the gssd_read_tmp SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_gssd_read_tmp)
- name: "Enable the gssd_read_tmp SELinux Boolean - Set SELinux Boolean gssd_read_tmp Accordingly"
  ansible.posix.seboolean:
    name: gssd_read_tmp
    state: "{{ var_gssd_read_tmp }}"
    persistent: yes
