# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the postgresql_selinux_transmit_client_label SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_postgresql_selinux_transmit_client_label)
- name: "Disable the postgresql_selinux_transmit_client_label SELinux Boolean - Set SELinux Boolean postgresql_selinux_transmit_client_label Accordingly"
  ansible.posix.seboolean:
    name: postgresql_selinux_transmit_client_label
    state: "{{ var_postgresql_selinux_transmit_client_label }}"
    persistent: yes
