# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Enable the nfs_export_all_ro SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_nfs_export_all_ro)
- name: "Enable the nfs_export_all_ro SELinux Boolean - Set SELinux Boolean nfs_export_all_ro Accordingly"
  ansible.posix.seboolean:
    name: nfs_export_all_ro
    state: "{{ var_nfs_export_all_ro }}"
    persistent: yes
