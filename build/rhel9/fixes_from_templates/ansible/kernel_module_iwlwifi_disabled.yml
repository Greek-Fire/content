# platform = multi_platform_rhel,multi_platform_fedora,multi_platform_ol,multi_platform_almalinux,multi_platform_rhv,multi_platform_ubuntu,multi_platform_sle,multi_platform_slmicro
# reboot = true
# strategy = disable
# complexity = low
# disruption = medium
- name: Ensure kernel module 'iwlwifi' is disabled
  ansible.builtin.lineinfile:
    create: yes
    dest: "/etc/modprobe.d/iwlwifi.conf"
    regexp: 'install\s+iwlwifi'
    line: "install iwlwifi /bin/false"

- name: Ensure kernel module 'iwlwifi' is blacklisted
  ansible.builtin.lineinfile:
    create: yes
    dest: "/etc/modprobe.d/iwlwifi.conf"
    regexp: '^blacklist iwlwifi$'
    line: "blacklist iwlwifi"
