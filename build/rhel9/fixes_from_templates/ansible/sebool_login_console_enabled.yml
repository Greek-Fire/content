# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Enable the login_console_enabled SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_login_console_enabled)
- name: "Enable the login_console_enabled SELinux Boolean - Set SELinux Boolean login_console_enabled Accordingly"
  ansible.posix.seboolean:
    name: login_console_enabled
    state: "{{ var_login_console_enabled }}"
    persistent: yes
