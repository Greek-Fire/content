# platform = multi_platform_all
# reboot = false
# strategy = configure
# complexity = low
# disruption = low
- name: Set the root_permissions_syslibrary_files_newgroup variable if represented by gid
  ansible.builtin.set_fact:
    root_permissions_syslibrary_files_newgroup: "0"

- name: Find /lib/ file(s) matching ^.*\.so.*$ recursively
  ansible.builtin.command: 'find -P /lib/  -type f  ! -group 0 -regextype posix-extended -regex "^.*\.so.*$"'
  register: files_found
  changed_when: False
  failed_when: False
  check_mode: no

- name: Ensure group owner on /lib/ file(s) matching ^.*\.so.*$
  ansible.builtin.file:
    path: "{{ item }}"
    follow: false
    group: "{{ root_permissions_syslibrary_files_newgroup }}"
    state: file
  with_items:
    - "{{ files_found.stdout_lines }}"





- name: Find /lib64/ file(s) matching ^.*\.so.*$ recursively
