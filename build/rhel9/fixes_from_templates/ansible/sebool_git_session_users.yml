# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the git_session_users SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_git_session_users)
- name: "Disable the git_session_users SELinux Boolean - Set SELinux Boolean git_session_users Accordingly"
  ansible.posix.seboolean:
    name: git_session_users
    state: "{{ var_git_session_users }}"
    persistent: yes
