# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the tor_bind_all_unreserved_ports SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_tor_bind_all_unreserved_ports)
- name: "Disable the tor_bind_all_unreserved_ports SELinux Boolean - Set SELinux Boolean tor_bind_all_unreserved_ports Accordingly"
  ansible.posix.seboolean:
    name: tor_bind_all_unreserved_ports
    state: "{{ var_tor_bind_all_unreserved_ports }}"
    persistent: yes
