# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the cups_execmem SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_cups_execmem)
- name: "Disable the cups_execmem SELinux Boolean - Set SELinux Boolean cups_execmem Accordingly"
  ansible.posix.seboolean:
    name: cups_execmem
    state: "{{ var_cups_execmem }}"
    persistent: yes
