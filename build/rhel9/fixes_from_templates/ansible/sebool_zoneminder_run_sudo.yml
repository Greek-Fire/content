# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the zoneminder_run_sudo SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_zoneminder_run_sudo)
- name: "Disable the zoneminder_run_sudo SELinux Boolean - Set SELinux Boolean zoneminder_run_sudo Accordingly"
  ansible.posix.seboolean:
    name: zoneminder_run_sudo
    state: "{{ var_zoneminder_run_sudo }}"
    persistent: yes
