# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the xserver_object_manager SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_xserver_object_manager)
- name: "Disable the xserver_object_manager SELinux Boolean - Set SELinux Boolean xserver_object_manager Accordingly"
  ansible.posix.seboolean:
    name: xserver_object_manager
    state: "{{ var_xserver_object_manager }}"
    persistent: yes
