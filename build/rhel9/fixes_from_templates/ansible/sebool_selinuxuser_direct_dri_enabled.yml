# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Configure the selinuxuser_direct_dri_enabled SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_selinuxuser_direct_dri_enabled)
- name: "Configure the selinuxuser_direct_dri_enabled SELinux Boolean - Set SELinux Boolean selinuxuser_direct_dri_enabled Accordingly"
  ansible.posix.seboolean:
    name: selinuxuser_direct_dri_enabled
    state: "{{ var_selinuxuser_direct_dri_enabled }}"
    persistent: yes
