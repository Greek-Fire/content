# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the authlogin_yubikey SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_authlogin_yubikey)
- name: "Disable the authlogin_yubikey SELinux Boolean - Set SELinux Boolean authlogin_yubikey Accordingly"
  ansible.posix.seboolean:
    name: authlogin_yubikey
    state: "{{ var_authlogin_yubikey }}"
    persistent: yes
