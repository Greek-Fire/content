# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the xguest_mount_media SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_xguest_mount_media)
- name: "Disable the xguest_mount_media SELinux Boolean - Set SELinux Boolean xguest_mount_media Accordingly"
  ansible.posix.seboolean:
    name: xguest_mount_media
    state: "{{ var_xguest_mount_media }}"
    persistent: yes
