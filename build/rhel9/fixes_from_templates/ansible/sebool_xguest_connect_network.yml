# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the xguest_connect_network SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_xguest_connect_network)
- name: "Disable the xguest_connect_network SELinux Boolean - Set SELinux Boolean xguest_connect_network Accordingly"
  ansible.posix.seboolean:
    name: xguest_connect_network
    state: "{{ var_xguest_connect_network }}"
    persistent: yes
