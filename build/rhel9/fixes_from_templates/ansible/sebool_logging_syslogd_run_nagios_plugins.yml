# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the logging_syslogd_run_nagios_plugins SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_logging_syslogd_run_nagios_plugins)
- name: "Disable the logging_syslogd_run_nagios_plugins SELinux Boolean - Set SELinux Boolean logging_syslogd_run_nagios_plugins Accordingly"
  ansible.posix.seboolean:
    name: logging_syslogd_run_nagios_plugins
    state: "{{ var_logging_syslogd_run_nagios_plugins }}"
    persistent: yes
