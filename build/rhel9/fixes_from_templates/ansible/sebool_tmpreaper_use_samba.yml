# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the tmpreaper_use_samba SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_tmpreaper_use_samba)
- name: "Disable the tmpreaper_use_samba SELinux Boolean - Set SELinux Boolean tmpreaper_use_samba Accordingly"
  ansible.posix.seboolean:
    name: tmpreaper_use_samba
    state: "{{ var_tmpreaper_use_samba }}"
    persistent: yes
