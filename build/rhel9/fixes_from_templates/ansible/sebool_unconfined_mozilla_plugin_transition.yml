# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Enable the unconfined_mozilla_plugin_transition SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_unconfined_mozilla_plugin_transition)
- name: "Enable the unconfined_mozilla_plugin_transition SELinux Boolean - Set SELinux Boolean unconfined_mozilla_plugin_transition Accordingly"
  ansible.posix.seboolean:
    name: unconfined_mozilla_plugin_transition
    state: "{{ var_unconfined_mozilla_plugin_transition }}"
    persistent: yes
