# platform = multi_platform_all
# reboot = true
# strategy = disable
# complexity = low
# disruption = medium

- name: Configure maximum number of process identifiers - Set fact for sysctl paths
  ansible.builtin.set_fact:

    sysctl_paths:
      - "/etc/sysctl.d/"
      - "/run/sysctl.d/"
      - "/usr/local/lib/sysctl.d/"



- name: Configure maximum number of process identifiers - Find all files that contain kernel.pid_max
  ansible.builtin.shell:
    cmd: find -L {{ sysctl_paths | join(" ") }} -type f -name '*.conf' | xargs grep -HP '^\s*kernel.pid_max\s*=\s*.*$'
  register: find_all_values
  check_mode: false
  changed_when: false
  failed_when: false

- name: Configure maximum number of process identifiers - Find all files that set kernel.pid_max to correct value
  ansible.builtin.shell:
    cmd: find -L {{ sysctl_paths | join(" ") }} -type f -name '*.conf' | xargs grep -HP '^\s*kernel.pid_max\s*=\s*65536$'
  register: find_correct_value
  check_mode: false
  changed_when: false
  failed_when: false

- name: Configure maximum number of process identifiers - Comment out any occurrences of kernel.pid_max from config files
  ansible.builtin.replace:
    path: '{{ item | split(":") | first }}'
    regexp: '^[\s]*kernel.pid_max'
    replace: '#kernel.pid_max'
  loop: '{{ find_all_values.stdout_lines }}'
  when: find_correct_value.stdout_lines | length == 0 or find_all_values.stdout_lines | length > find_correct_value.stdout_lines | length




- name: Configure maximum number of process identifiers - Comment out any occurrences of kernel.pid_max from /etc/sysctl.conf
  ansible.builtin.replace:
    path: "{{ item }}"
    regexp: '^[\s]*kernel.pid_max'
    replace: '#kernel.pid_max'
  with_fileglob:
    - "/etc/sysctl.conf"

- name: Configure maximum number of process identifiers - Ensure sysctl kernel.pid_max is set to 65536
  ansible.posix.sysctl:
    name: "kernel.pid_max"
    value: "65536"

    sysctl_file: "/etc/sysctl.d/kernel_pid_max.conf"

    state: present
    reload: yes