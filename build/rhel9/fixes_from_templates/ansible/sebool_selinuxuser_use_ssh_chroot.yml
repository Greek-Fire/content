# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the selinuxuser_use_ssh_chroot SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_selinuxuser_use_ssh_chroot)
- name: "Disable the selinuxuser_use_ssh_chroot SELinux Boolean - Set SELinux Boolean selinuxuser_use_ssh_chroot Accordingly"
  ansible.posix.seboolean:
    name: selinuxuser_use_ssh_chroot
    state: "{{ var_selinuxuser_use_ssh_chroot }}"
    persistent: yes
