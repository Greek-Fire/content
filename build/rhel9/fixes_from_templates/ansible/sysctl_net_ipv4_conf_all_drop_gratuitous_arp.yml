# platform = multi_platform_all
# reboot = true
# strategy = disable
# complexity = low
# disruption = medium

- name: Drop Gratuitous ARP frames on All IPv4 Interfaces - Set fact for sysctl paths
  ansible.builtin.set_fact:

    sysctl_paths:
      - "/etc/sysctl.d/"
      - "/run/sysctl.d/"
      - "/usr/local/lib/sysctl.d/"



- name: Drop Gratuitous ARP frames on All IPv4 Interfaces - Find all files that contain net.ipv4.conf.all.drop_gratuitous_arp
  ansible.builtin.shell:
    cmd: find -L {{ sysctl_paths | join(" ") }} -type f -name '*.conf' | xargs grep -HP '^\s*net.ipv4.conf.all.drop_gratuitous_arp\s*=\s*.*$'
  register: find_all_values
  check_mode: false
  changed_when: false
  failed_when: false

- name: Drop Gratuitous ARP frames on All IPv4 Interfaces - Find all files that set net.ipv4.conf.all.drop_gratuitous_arp to correct value
  ansible.builtin.shell:
    cmd: find -L {{ sysctl_paths | join(" ") }} -type f -name '*.conf' | xargs grep -HP '^\s*net.ipv4.conf.all.drop_gratuitous_arp\s*=\s*1$'
  register: find_correct_value
  check_mode: false
  changed_when: false
  failed_when: false

- name: Drop Gratuitous ARP frames on All IPv4 Interfaces - Comment out any occurrences of net.ipv4.conf.all.drop_gratuitous_arp from config files
  ansible.builtin.replace:
    path: '{{ item | split(":") | first }}'
    regexp: '^[\s]*net.ipv4.conf.all.drop_gratuitous_arp'
    replace: '#net.ipv4.conf.all.drop_gratuitous_arp'
  loop: '{{ find_all_values.stdout_lines }}'
  when: find_correct_value.stdout_lines | length == 0 or find_all_values.stdout_lines | length > find_correct_value.stdout_lines | length




- name: Drop Gratuitous ARP frames on All IPv4 Interfaces - Comment out any occurrences of net.ipv4.conf.all.drop_gratuitous_arp from /etc/sysctl.conf
  ansible.builtin.replace:
    path: "{{ item }}"
    regexp: '^[\s]*net.ipv4.conf.all.drop_gratuitous_arp'
    replace: '#net.ipv4.conf.all.drop_gratuitous_arp'
  with_fileglob:
    - "/etc/sysctl.conf"

- name: Drop Gratuitous ARP frames on All IPv4 Interfaces - Ensure sysctl net.ipv4.conf.all.drop_gratuitous_arp is set to 1
  ansible.posix.sysctl:
    name: "net.ipv4.conf.all.drop_gratuitous_arp"
    value: "1"

    sysctl_file: "/etc/sysctl.d/net_ipv4_conf_all_drop_gratuitous_arp.conf"

    state: present
    reload: yes