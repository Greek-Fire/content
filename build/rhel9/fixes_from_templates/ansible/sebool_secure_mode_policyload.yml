# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the secure_mode_policyload SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_secure_mode_policyload)
- name: "Disable the secure_mode_policyload SELinux Boolean - Set SELinux Boolean secure_mode_policyload Accordingly"
  ansible.posix.seboolean:
    name: secure_mode_policyload
    state: "{{ var_secure_mode_policyload }}"
    persistent: yes
