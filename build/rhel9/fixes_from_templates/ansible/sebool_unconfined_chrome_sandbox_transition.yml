# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Enable the unconfined_chrome_sandbox_transition SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_unconfined_chrome_sandbox_transition)
- name: "Enable the unconfined_chrome_sandbox_transition SELinux Boolean - Set SELinux Boolean unconfined_chrome_sandbox_transition Accordingly"
  ansible.posix.seboolean:
    name: unconfined_chrome_sandbox_transition
    state: "{{ var_unconfined_chrome_sandbox_transition }}"
    persistent: yes
