# platform = multi_platform_all
# reboot = false
# strategy = configure
# complexity = low
# disruption = low









- name: Find /var/log/gdm3/ file(s) recursively
  ansible.builtin.command: 'find -P /var/log/gdm3/  -perm /u+xs,g+xs,o+xwrt  -type f -regextype posix-extended -regex ".*"'
  register: files_found
  changed_when: False
  failed_when: False
  check_mode: no

- name: Set permissions for /var/log/gdm3/ file(s)
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "u-xs,g-xs,o-xwrt"
    state: "file"
  with_items:
    - "{{ files_found.stdout_lines }}"


