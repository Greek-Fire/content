# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the global_ssp SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_global_ssp)
- name: "Disable the global_ssp SELinux Boolean - Set SELinux Boolean global_ssp Accordingly"
  ansible.posix.seboolean:
    name: global_ssp
    state: "{{ var_global_ssp }}"
    persistent: yes
