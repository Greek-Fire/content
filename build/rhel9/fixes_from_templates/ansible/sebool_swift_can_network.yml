# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the swift_can_network SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_swift_can_network)
- name: "Disable the swift_can_network SELinux Boolean - Set SELinux Boolean swift_can_network Accordingly"
  ansible.posix.seboolean:
    name: swift_can_network
    state: "{{ var_swift_can_network }}"
    persistent: yes
