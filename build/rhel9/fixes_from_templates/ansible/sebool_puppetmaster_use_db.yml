# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the puppetmaster_use_db SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_puppetmaster_use_db)
- name: "Disable the puppetmaster_use_db SELinux Boolean - Set SELinux Boolean puppetmaster_use_db Accordingly"
  ansible.posix.seboolean:
    name: puppetmaster_use_db
    state: "{{ var_puppetmaster_use_db }}"
    persistent: yes
