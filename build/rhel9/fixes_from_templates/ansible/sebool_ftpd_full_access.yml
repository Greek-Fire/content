# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the ftpd_full_access SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_ftpd_full_access)
- name: "Disable the ftpd_full_access SELinux Boolean - Set SELinux Boolean ftpd_full_access Accordingly"
  ansible.posix.seboolean:
    name: ftpd_full_access
    state: "{{ var_ftpd_full_access }}"
    persistent: yes
