# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the glance_use_fusefs SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_glance_use_fusefs)
- name: "Disable the glance_use_fusefs SELinux Boolean - Set SELinux Boolean glance_use_fusefs Accordingly"
  ansible.posix.seboolean:
    name: glance_use_fusefs
    state: "{{ var_glance_use_fusefs }}"
    persistent: yes
