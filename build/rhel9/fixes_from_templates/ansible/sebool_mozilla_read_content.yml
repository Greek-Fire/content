# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the mozilla_read_content SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_mozilla_read_content)
- name: "Disable the mozilla_read_content SELinux Boolean - Set SELinux Boolean mozilla_read_content Accordingly"
  ansible.posix.seboolean:
    name: mozilla_read_content
    state: "{{ var_mozilla_read_content }}"
    persistent: yes
