# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the prosody_bind_http_port SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_prosody_bind_http_port)
- name: "Disable the prosody_bind_http_port SELinux Boolean - Set SELinux Boolean prosody_bind_http_port Accordingly"
  ansible.posix.seboolean:
    name: prosody_bind_http_port
    state: "{{ var_prosody_bind_http_port }}"
    persistent: yes
