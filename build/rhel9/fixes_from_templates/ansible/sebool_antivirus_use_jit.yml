# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the antivirus_use_jit SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_antivirus_use_jit)
- name: "Disable the antivirus_use_jit SELinux Boolean - Set SELinux Boolean antivirus_use_jit Accordingly"
  ansible.posix.seboolean:
    name: antivirus_use_jit
    state: "{{ var_antivirus_use_jit }}"
    persistent: yes
