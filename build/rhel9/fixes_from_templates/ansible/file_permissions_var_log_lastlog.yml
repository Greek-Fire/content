# platform = multi_platform_all
# reboot = false
# strategy = configure
# complexity = low
# disruption = low









- name: Find /var/log/ file(s)
  ansible.builtin.command: 'find -P /var/log/ -maxdepth 1 -perm /u+xs,g+xs,o+xwt  -type f -regextype posix-extended -regex ".*lastlog(\.[^\/]+)?$"'
  register: files_found
  changed_when: False
  failed_when: False
  check_mode: no

- name: Set permissions for /var/log/ file(s)
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "u-xs,g-xs,o-xwt"
    state: "file"
  with_items:
    - "{{ files_found.stdout_lines }}"


