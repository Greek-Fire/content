# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the staff_use_svirt SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_staff_use_svirt)
- name: "Disable the staff_use_svirt SELinux Boolean - Set SELinux Boolean staff_use_svirt Accordingly"
  ansible.posix.seboolean:
    name: staff_use_svirt
    state: "{{ var_staff_use_svirt }}"
    persistent: yes
