# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the httpd_tty_comm SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_httpd_tty_comm)
- name: "Disable the httpd_tty_comm SELinux Boolean - Set SELinux Boolean httpd_tty_comm Accordingly"
  ansible.posix.seboolean:
    name: httpd_tty_comm
    state: "{{ var_httpd_tty_comm }}"
    persistent: yes
