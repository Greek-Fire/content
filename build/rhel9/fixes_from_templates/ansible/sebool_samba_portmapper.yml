# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the samba_portmapper SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_samba_portmapper)
- name: "Disable the samba_portmapper SELinux Boolean - Set SELinux Boolean samba_portmapper Accordingly"
  ansible.posix.seboolean:
    name: samba_portmapper
    state: "{{ var_samba_portmapper }}"
    persistent: yes
