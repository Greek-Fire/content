# platform = multi_platform_all
# reboot = true
# strategy = disable
# complexity = low
# disruption = medium

- name: Limit CPU consumption of the Perf system - Set fact for sysctl paths
  ansible.builtin.set_fact:

    sysctl_paths:
      - "/etc/sysctl.d/"
      - "/run/sysctl.d/"
      - "/usr/local/lib/sysctl.d/"



- name: Limit CPU consumption of the Perf system - Find all files that contain kernel.perf_cpu_time_max_percent
  ansible.builtin.shell:
    cmd: find -L {{ sysctl_paths | join(" ") }} -type f -name '*.conf' | xargs grep -HP '^\s*kernel.perf_cpu_time_max_percent\s*=\s*.*$'
  register: find_all_values
  check_mode: false
  changed_when: false
  failed_when: false

- name: Limit CPU consumption of the Perf system - Find all files that set kernel.perf_cpu_time_max_percent to correct value
  ansible.builtin.shell:
    cmd: find -L {{ sysctl_paths | join(" ") }} -type f -name '*.conf' | xargs grep -HP '^\s*kernel.perf_cpu_time_max_percent\s*=\s*1$'
  register: find_correct_value
  check_mode: false
  changed_when: false
  failed_when: false

- name: Limit CPU consumption of the Perf system - Comment out any occurrences of kernel.perf_cpu_time_max_percent from config files
  ansible.builtin.replace:
    path: '{{ item | split(":") | first }}'
    regexp: '^[\s]*kernel.perf_cpu_time_max_percent'
    replace: '#kernel.perf_cpu_time_max_percent'
  loop: '{{ find_all_values.stdout_lines }}'
  when: find_correct_value.stdout_lines | length == 0 or find_all_values.stdout_lines | length > find_correct_value.stdout_lines | length




- name: Limit CPU consumption of the Perf system - Comment out any occurrences of kernel.perf_cpu_time_max_percent from /etc/sysctl.conf
  ansible.builtin.replace:
    path: "{{ item }}"
    regexp: '^[\s]*kernel.perf_cpu_time_max_percent'
    replace: '#kernel.perf_cpu_time_max_percent'
  with_fileglob:
    - "/etc/sysctl.conf"

- name: Limit CPU consumption of the Perf system - Ensure sysctl kernel.perf_cpu_time_max_percent is set to 1
  ansible.posix.sysctl:
    name: "kernel.perf_cpu_time_max_percent"
    value: "1"

    sysctl_file: "/etc/sysctl.d/kernel_perf_cpu_time_max_percent.conf"

    state: present
    reload: yes