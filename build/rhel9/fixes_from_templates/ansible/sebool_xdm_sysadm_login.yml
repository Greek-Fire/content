# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the xdm_sysadm_login SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_xdm_sysadm_login)
- name: "Disable the xdm_sysadm_login SELinux Boolean - Set SELinux Boolean xdm_sysadm_login Accordingly"
  ansible.posix.seboolean:
    name: xdm_sysadm_login
    state: "{{ var_xdm_sysadm_login }}"
    persistent: yes
