# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the fcron_crond SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_fcron_crond)
- name: "Disable the fcron_crond SELinux Boolean - Set SELinux Boolean fcron_crond Accordingly"
  ansible.posix.seboolean:
    name: fcron_crond
    state: "{{ var_fcron_crond }}"
    persistent: yes
