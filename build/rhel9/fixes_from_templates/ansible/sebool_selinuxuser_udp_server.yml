# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the selinuxuser_udp_server SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_selinuxuser_udp_server)
- name: "Disable the selinuxuser_udp_server SELinux Boolean - Set SELinux Boolean selinuxuser_udp_server Accordingly"
  ansible.posix.seboolean:
    name: selinuxuser_udp_server
    state: "{{ var_selinuxuser_udp_server }}"
    persistent: yes
