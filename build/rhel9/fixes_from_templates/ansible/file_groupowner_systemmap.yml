# platform = multi_platform_all
# reboot = false
# strategy = configure
# complexity = low
# disruption = low
- name: Check that the root group is defined
  ansible.builtin.getent:
    database: group
    key: root
  ignore_errors: yes
  when: file_groupowner_systemmap_newgroup is undefined

- name: Set the file_groupowner_systemmap_newgroup variable if root found
  ansible.builtin.set_fact:
    file_groupowner_systemmap_newgroup: "root"
  when: ansible_facts.getent_group["root"] is defined

- name: Find /boot/ file(s) matching ^.*System\.map.*$
  ansible.builtin.command: 'find -P /boot/ -maxdepth 1 -type f  ! -group root -regextype posix-extended -regex "^.*System\.map.*$"'
  register: files_found
  changed_when: False
  failed_when: False
  check_mode: no

- name: Ensure group owner on /boot/ file(s) matching ^.*System\.map.*$
  ansible.builtin.file:
    path: "{{ item }}"
    follow: false
    group: "{{ file_groupowner_systemmap_newgroup }}"
    state: file
  with_items:
    - "{{ files_found.stdout_lines }}"



