# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the xserver_clients_write_xshm SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_xserver_clients_write_xshm)
- name: "Disable the xserver_clients_write_xshm SELinux Boolean - Set SELinux Boolean xserver_clients_write_xshm Accordingly"
  ansible.posix.seboolean:
    name: xserver_clients_write_xshm
    state: "{{ var_xserver_clients_write_xshm }}"
    persistent: yes
