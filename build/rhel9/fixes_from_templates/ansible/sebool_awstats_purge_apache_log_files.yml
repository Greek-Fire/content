# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the awstats_purge_apache_log_files SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_awstats_purge_apache_log_files)
- name: "Disable the awstats_purge_apache_log_files SELinux Boolean - Set SELinux Boolean awstats_purge_apache_log_files Accordingly"
  ansible.posix.seboolean:
    name: awstats_purge_apache_log_files
    state: "{{ var_awstats_purge_apache_log_files }}"
    persistent: yes
