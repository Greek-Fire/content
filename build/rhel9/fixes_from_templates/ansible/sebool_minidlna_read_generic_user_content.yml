# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the minidlna_read_generic_user_content SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_minidlna_read_generic_user_content)
- name: "Disable the minidlna_read_generic_user_content SELinux Boolean - Set SELinux Boolean minidlna_read_generic_user_content Accordingly"
  ansible.posix.seboolean:
    name: minidlna_read_generic_user_content
    state: "{{ var_minidlna_read_generic_user_content }}"
    persistent: yes
