# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the logwatch_can_network_connect_mail SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_logwatch_can_network_connect_mail)
- name: "Disable the logwatch_can_network_connect_mail SELinux Boolean - Set SELinux Boolean logwatch_can_network_connect_mail Accordingly"
  ansible.posix.seboolean:
    name: logwatch_can_network_connect_mail
    state: "{{ var_logwatch_can_network_connect_mail }}"
    persistent: yes
