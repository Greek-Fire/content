# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the kdumpgui_run_bootloader SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_kdumpgui_run_bootloader)
- name: "Disable the kdumpgui_run_bootloader SELinux Boolean - Set SELinux Boolean kdumpgui_run_bootloader Accordingly"
  ansible.posix.seboolean:
    name: kdumpgui_run_bootloader
    state: "{{ var_kdumpgui_run_bootloader }}"
    persistent: yes
