# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the cron_system_cronjob_use_shares SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_cron_system_cronjob_use_shares)
- name: "Disable the cron_system_cronjob_use_shares SELinux Boolean - Set SELinux Boolean cron_system_cronjob_use_shares Accordingly"
  ansible.posix.seboolean:
    name: cron_system_cronjob_use_shares
    state: "{{ var_cron_system_cronjob_use_shares }}"
    persistent: yes
