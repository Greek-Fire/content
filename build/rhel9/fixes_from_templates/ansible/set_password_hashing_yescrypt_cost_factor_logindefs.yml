# platform = multi_platform_all
# reboot = false
# strategy = configure
# complexity = low
# disruption = low


- (xccdf-var var_password_yescrypt_cost_factor_login_defs)



- name: "Set yescrypt Cost Factor in /etc/login.defs"
  block:
    - name: "Check for duplicate values"
      ansible.builtin.lineinfile:
        path: '/etc/login.defs'
        create: True
        regexp: '(?i)^\s*YESCRYPT_COST_FACTOR\s*'
        state: 'absent'
      check_mode: yes
      changed_when: no
      register: 'dupes'
    - name: "Deduplicate values from /etc/login.defs"
      ansible.builtin.lineinfile:
        path: '/etc/login.defs'
        create: True
        regexp: '(?i)^\s*YESCRYPT_COST_FACTOR\s*'
        state: 'absent'
      when: 'dupes.found is defined and dupes.found > 1'
    - name: "Insert correct line to /etc/login.defs"
      ansible.builtin.lineinfile:
        path: '/etc/login.defs'
        create: True
        regexp: '(?i)^\s*YESCRYPT_COST_FACTOR\s*'
        line: 'YESCRYPT_COST_FACTOR {{ var_password_yescrypt_cost_factor_login_defs }}'
        state: present
