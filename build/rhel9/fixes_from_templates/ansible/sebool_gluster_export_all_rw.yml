# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Configure the gluster_export_all_rw SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_gluster_export_all_rw)
- name: "Configure the gluster_export_all_rw SELinux Boolean - Set SELinux Boolean gluster_export_all_rw Accordingly"
  ansible.posix.seboolean:
    name: gluster_export_all_rw
    state: "{{ var_gluster_export_all_rw }}"
    persistent: yes
