# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Configure the httpd_enable_cgi SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_httpd_enable_cgi)
- name: "Configure the httpd_enable_cgi SELinux Boolean - Set SELinux Boolean httpd_enable_cgi Accordingly"
  ansible.posix.seboolean:
    name: httpd_enable_cgi
    state: "{{ var_httpd_enable_cgi }}"
    persistent: yes
