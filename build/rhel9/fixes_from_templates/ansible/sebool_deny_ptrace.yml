# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the deny_ptrace SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_deny_ptrace)
- name: "Disable the deny_ptrace SELinux Boolean - Set SELinux Boolean deny_ptrace Accordingly"
  ansible.posix.seboolean:
    name: deny_ptrace
    state: "{{ var_deny_ptrace }}"
    persistent: yes
