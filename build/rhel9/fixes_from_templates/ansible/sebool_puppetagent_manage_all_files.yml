# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Disable the puppetagent_manage_all_files SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_puppetagent_manage_all_files)
- name: "Disable the puppetagent_manage_all_files SELinux Boolean - Set SELinux Boolean puppetagent_manage_all_files Accordingly"
  ansible.posix.seboolean:
    name: puppetagent_manage_all_files
    state: "{{ var_puppetagent_manage_all_files }}"
    persistent: yes
