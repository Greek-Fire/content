# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low





- name: "Enable the antivirus_can_scan_system SELinux Boolean - Ensure python3-libsemanage Installed"
  ansible.builtin.package:
    name: "python3-libsemanage"
    state: present




- (xccdf-var var_antivirus_can_scan_system)
- name: "Enable the antivirus_can_scan_system SELinux Boolean - Set SELinux Boolean antivirus_can_scan_system Accordingly"
  ansible.posix.seboolean:
    name: antivirus_can_scan_system
    state: "{{ var_antivirus_can_scan_system }}"
    persistent: yes
