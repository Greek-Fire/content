# platform = multi_platform_debian,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,multi_platform_sle,multi_platform_slmicro,multi_platform_almalinux
# reboot = true
# strategy = restrict
# complexity = medium
# disruption = low


- (xccdf-var var_rng_core_default_quality)




- name: Check if rng_core.default_quality argument is already present in /etc/default/grub
  ansible.builtin.slurp:
    src: /etc/default/grub
  register: etc_default_grub

- name: Check if rng_core.default_quality argument is already present
  ansible.builtin.command: /sbin/grubby --info=ALL
  register: grubby_info
  check_mode: False
  changed_when: False
  failed_when: False

- name: Update grub defaults and the bootloader menu
  ansible.builtin.command: /sbin/grubby --update-kernel=ALL --args="rng_core.default_quality={{ var_rng_core_default_quality }}"
  when: (grubby_info.stdout is not search('rng_core.default_quality=' ~ var_rng_core_default_quality)) or ((etc_default_grub['content'] | b64decode) is not search('rng_core.default_quality=' ~ var_rng_core_default_quality))

