# platform = multi_platform_all
# reboot = false
# strategy = restrict
# complexity = low
# disruption = low






- name: Ensure auditd Collects System Administrator Actions - /etc/sudoers.d/ - Check if watch rule for /etc/sudoers.d/ already exists in /etc/audit/rules.d/
  ansible.builtin.find:
    paths: "/etc/audit/rules.d"

    contains: '^\s*-w\s+/etc/sudoers.d/\s+-p\s+wa(\s|$)+'

    patterns: "*.rules"
  register: find_existing_watch_rules_d

- name: Ensure auditd Collects System Administrator Actions - /etc/sudoers.d/ - Search /etc/audit/rules.d for other rules with specified key actions
  ansible.builtin.find:
    paths: "/etc/audit/rules.d"
    contains: '^.*(?:-F key=|-k\s+)actions$'
    patterns: "*.rules"
  register: find_watch_key
  when: find_existing_watch_rules_d.matched is defined and find_existing_watch_rules_d.matched == 0

- name: Ensure auditd Collects System Administrator Actions - /etc/sudoers.d/ - Use /etc/audit/rules.d/actions.rules as the recipient for the rule
  ansible.builtin.set_fact:
    all_files:
      - /etc/audit/rules.d/actions.rules
  when: find_watch_key.matched is defined and find_watch_key.matched == 0 and find_existing_watch_rules_d.matched is defined and find_existing_watch_rules_d.matched == 0

- name: Ensure auditd Collects System Administrator Actions - /etc/sudoers.d/ - Use matched file as the recipient for the rule
  ansible.builtin.set_fact:
    all_files:
      - "{{ find_watch_key.files | map(attribute='path') | list | first }}"
  when: find_watch_key.matched is defined and find_watch_key.matched > 0 and find_existing_watch_rules_d.matched is defined and find_existing_watch_rules_d.matched == 0

- name: Ensure auditd Collects System Administrator Actions - /etc/sudoers.d/ - Add watch rule for /etc/sudoers.d/ in /etc/audit/rules.d/
  ansible.builtin.lineinfile:
    path: "{{ all_files[0] }}"

    line: "-w /etc/sudoers.d/ -p wa -k actions"

    create: yes
    mode: '0600'
  when: find_existing_watch_rules_d.matched is defined and find_existing_watch_rules_d.matched == 0
- name: Ensure auditd Collects System Administrator Actions - /etc/sudoers.d/ - Check if watch rule for /etc/sudoers.d/ already exists in /etc/audit/audit.rules
  ansible.builtin.find:
    paths: "/etc/audit/"

    contains: '^\s*-w\s+/etc/sudoers.d/\s+-p\s+wa(\s|$)+'

    patterns: "audit.rules"
  register: find_existing_watch_audit_rules

- name: Ensure auditd Collects System Administrator Actions - /etc/sudoers.d/ - Add watch rule for /etc/sudoers.d/ in /etc/audit/audit.rules
  ansible.builtin.lineinfile:

    line: "-w /etc/sudoers.d/ -p wa -k actions"

    state: present
    dest: /etc/audit/audit.rules
    create: yes
    mode: '0600'
  when: find_existing_watch_audit_rules.matched is defined and find_existing_watch_audit_rules.matched == 0
