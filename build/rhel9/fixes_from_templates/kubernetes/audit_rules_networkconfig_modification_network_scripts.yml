# platform = multi_platform_ocp,multi_platform_rhcos
# reboot = true
# strategy = disable
# complexity = low
# disruption = medium
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
spec:
  config:
    ignition:
      version: 3.1.0
    storage:
      files:
      - contents:

          source: data:,-w%20/etc/sysconfig/network-scripts%20-p%20wa%20-k%20system-locale%0A

        mode: 0644
        path: /etc/audit/rules.d/75-audit_rules_networkconfig_modification_network_scripts.rules
        overwrite: true