# platform = multi_platform_all
# reboot = false
# strategy = configure
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - configure_strategy
  - file_permissions_system_journal
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Test for existence ^/var/log/journal/.*/system.journal$
  ansible.builtin.stat:
    path: ^/var/log/journal/.*/system.journal$
  register: file_exists
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - configure_strategy
  - file_permissions_system_journal
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Ensure permission u-xs,g-xws,o-xwrt on ^/var/log/journal/.*/system.journal$
  ansible.builtin.file:
    path: ^/var/log/journal/.*/system.journal$
    mode: u-xs,g-xws,o-xwrt
  when:
  - '"kernel-core" in ansible_facts.packages'
  - file_exists.stat is defined and file_exists.stat.exists
  tags:
  - configure_strategy
  - file_permissions_system_journal
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
