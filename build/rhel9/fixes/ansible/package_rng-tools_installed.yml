# platform = multi_platform_all
# reboot = false
# strategy = enable
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-83504-1
  - DISA-STIG-RHEL-09-215090
  - enable_strategy
  - low_complexity
  - low_disruption
  - low_severity
  - no_reboot_needed
  - package_rng-tools_installed

- name: Ensure rng-tools is installed
  ansible.builtin.package:
    name: rng-tools
    state: present
  when: ( "kernel-core" in ansible_facts.packages )
  tags:
  - CCE-83504-1
  - DISA-STIG-RHEL-09-215090
  - enable_strategy
  - low_complexity
  - low_disruption
  - low_severity
  - no_reboot_needed
  - package_rng-tools_installed
