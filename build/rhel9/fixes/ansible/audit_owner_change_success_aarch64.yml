# platform = multi_platform_all
# reboot = false
# strategy = restrict
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-85948-8
  - NIST-800-53-AU-2(a)
  - audit_owner_change_success_aarch64
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy

- name: Put contents into /etc/audit/rules.d/30-ospp-v42-6-owner-change-success.rules
    according to policy
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/30-ospp-v42-6-owner-change-success.rules
    content: |
      ## Successful ownership change
      -a always,exit -F arch=b32 -S lchown,fchown,chown,fchownat -F success=1 -F auid>=1000 -F auid!=unset -F key=successful-owner-change
      -a always,exit -F arch=b64 -S fchown,fchownat -F success=1 -F auid>=1000 -F auid!=unset -F key=successful-owner-change
    force: true
  when:
  - '"kernel-core" in ansible_facts.packages'
  - ansible_architecture == "aarch64"
  tags:
  - CCE-85948-8
  - NIST-800-53-AU-2(a)
  - audit_owner_change_success_aarch64
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy

- name: Configure auditing of successful ownership changes (AArch64) - Remove any
    permissions from group and other
  ansible.builtin.file:
    path: /etc/audit/rules.d/30-ospp-v42-6-owner-change-success.rules
    mode: g-rwx,o-rwx
    state: touch
  when:
  - '"kernel-core" in ansible_facts.packages'
  - ansible_architecture == "aarch64"
  tags:
  - CCE-85948-8
  - NIST-800-53-AU-2(a)
  - audit_owner_change_success_aarch64
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy
