# platform = multi_platform_all
# reboot = false
# strategy = enable
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-83595-9
  - DISA-STIG-RHEL-09-611185
  - NIST-800-53-CM-6(a)
  - enable_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - package_opensc_installed

- name: Ensure opensc is installed
  ansible.builtin.package:
    name: opensc
    state: present
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-83595-9
  - DISA-STIG-RHEL-09-611185
  - NIST-800-53-CM-6(a)
  - enable_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - package_opensc_installed
