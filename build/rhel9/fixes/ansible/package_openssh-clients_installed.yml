# platform = multi_platform_all
# reboot = false
# strategy = enable
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-90836-8
  - DISA-STIG-RHEL-09-255020
  - enable_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - package_openssh-clients_installed

- name: Ensure openssh-clients is installed
  ansible.builtin.package:
    name: openssh-clients
    state: present
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-90836-8
  - DISA-STIG-RHEL-09-255020
  - enable_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - package_openssh-clients_installed
