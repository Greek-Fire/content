# platform = multi_platform_all
# reboot = false
# strategy = configure
# complexity = low
# disruption = low
- name: Check that the utmp group is defined
  ansible.builtin.getent:
    database: group
    key: utmp
  ignore_errors: true
  when: file_groupowner_var_log_wbtmp_newgroup is undefined
  tags:
  - configure_strategy
  - file_groupowner_var_log_wbtmp
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Set the file_groupowner_var_log_wbtmp_newgroup variable if utmp found
  ansible.builtin.set_fact:
    file_groupowner_var_log_wbtmp_newgroup: utmp
  when: ansible_facts.getent_group["utmp"] is defined
  tags:
  - configure_strategy
  - file_groupowner_var_log_wbtmp
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Check that the root group is defined
  ansible.builtin.getent:
    database: group
    key: root
  ignore_errors: true
  when: file_groupowner_var_log_wbtmp_newgroup is undefined
  tags:
  - configure_strategy
  - file_groupowner_var_log_wbtmp
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Set the file_groupowner_var_log_wbtmp_newgroup variable if root found
  ansible.builtin.set_fact:
    file_groupowner_var_log_wbtmp_newgroup: root
  when: ansible_facts.getent_group["root"] is defined
  tags:
  - configure_strategy
  - file_groupowner_var_log_wbtmp
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Find /var/log/ file(s) matching .*(b|w)tmp((\.|-)[^\/]+)?
  ansible.builtin.command: find -P /var/log/ -maxdepth 1 -type f  ! -group utmp !
    -group root -regextype posix-extended -regex ".*(b|w)tmp((\.|-)[^\/]+)?"
  register: files_found
  changed_when: false
  failed_when: false
  check_mode: false
  tags:
  - configure_strategy
  - file_groupowner_var_log_wbtmp
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Ensure group owner on /var/log/ file(s) matching .*(b|w)tmp((\.|-)[^\/]+)?
  ansible.builtin.file:
    path: '{{ item }}'
    follow: false
    group: '{{ file_groupowner_var_log_wbtmp_newgroup }}'
    state: file
  with_items:
  - '{{ files_found.stdout_lines }}'
  tags:
  - configure_strategy
  - file_groupowner_var_log_wbtmp
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
