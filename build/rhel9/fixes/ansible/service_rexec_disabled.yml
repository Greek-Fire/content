# platform = multi_platform_all
# reboot = false
# strategy = disable
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-88104-5
  - NIST-800-171-3.1.13
  - NIST-800-171-3.4.7
  - NIST-800-53-CM-6(a)
  - NIST-800-53-CM-7(a)
  - NIST-800-53-CM-7(b)
  - NIST-800-53-IA-5(1)(c)
  - disable_strategy
  - high_severity
  - low_complexity
  - low_disruption
  - no_reboot_needed
  - service_rexec_disabled

- name: Disable rexec Service - Disable service rexec
  block:

  - name: Disable rexec Service - Collect systemd Services Present in the System
    ansible.builtin.command: systemctl -q list-unit-files --type service
    register: service_exists
    changed_when: false
    failed_when: service_exists.rc not in [0, 1]
    check_mode: false

  - name: Disable rexec Service - Ensure rexec.service is Masked
    ansible.builtin.systemd:
      name: rexec.service
      state: stopped
      enabled: false
      masked: true
    when: service_exists.stdout_lines is search("rexec.service", multiline=True)

  - name: Unit Socket Exists - rexec.socket
    ansible.builtin.command: systemctl -q list-unit-files rexec.socket
    register: socket_file_exists
    changed_when: false
    failed_when: socket_file_exists.rc not in [0, 1]
    check_mode: false

  - name: Disable rexec Service - Disable Socket rexec
    ansible.builtin.systemd:
      name: rexec.socket
      enabled: false
      state: stopped
      masked: true
    when: socket_file_exists.stdout_lines is search("rexec.socket", multiline=True)
  tags:
  - CCE-88104-5
  - NIST-800-171-3.1.13
  - NIST-800-171-3.4.7
  - NIST-800-53-CM-6(a)
  - NIST-800-53-CM-7(a)
  - NIST-800-53-CM-7(b)
  - NIST-800-53-IA-5(1)(c)
  - disable_strategy
  - high_severity
  - low_complexity
  - low_disruption
  - no_reboot_needed
  - service_rexec_disabled
  - special_service_block
  when: '"kernel-core" in ansible_facts.packages'
