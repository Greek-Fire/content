# platform = multi_platform_all
# reboot = false
# strategy = disable
# complexity = low
# disruption = low
- name: 'Remove telnet Clients: Ensure inetutils-telnet is removed'
  ansible.builtin.package:
    name: inetutils-telnet
    state: absent
  tags:
  - disable_strategy
  - low_complexity
  - low_disruption
  - low_severity
  - no_reboot_needed
  - package_inetutils-telnet_removed
