# platform = multi_platform_all
# reboot = false
# strategy = disable
# complexity = low
# disruption = low
- name: 'Uninstall nfs-common Package: Ensure nfs-common is removed'
  ansible.builtin.package:
    name: nfs-common
    state: absent
  tags:
  - disable_strategy
  - low_complexity
  - low_disruption
  - low_severity
  - no_reboot_needed
  - package_nfs-common_removed
