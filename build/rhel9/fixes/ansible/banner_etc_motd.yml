# platform = multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,multi_platform_sle,multi_platform_slmicro,multi_platform_almalinux
# reboot = false
# strategy = unknown
# complexity = low
# disruption = medium
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-83559-5
  - banner_etc_motd
  - low_complexity
  - medium_disruption
  - medium_severity
  - no_reboot_needed
  - unknown_strategy
- (xccdf-var motd_banner_contents)

- name: Modify the System Message of the Day Banner - ensure correct banner
  ansible.builtin.copy:
    dest: /etc/motd
    content: |
      {{ motd_banner_contents | replace('\n', '
      ') }}
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-83559-5
  - banner_etc_motd
  - low_complexity
  - medium_disruption
  - medium_severity
  - no_reboot_needed
  - unknown_strategy
