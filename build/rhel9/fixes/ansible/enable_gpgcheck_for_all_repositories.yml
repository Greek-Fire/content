# platform = multi_platform_rhel,multi_platform_ol
# reboot = false
# strategy = enable
# complexity = low
# disruption = medium
- name: 'Ensure gpgcheck Is Enabled for All Package Repositories: Grep for dnf repo
    section names'
  ansible.builtin.shell: |
    set -o pipefail
    grep -HEr '^\[.+\]' -r /etc/yum.repos.d/
  register: repo_grep_results
  failed_when: repo_grep_results.rc not in [0, 1]
  changed_when: false
  tags:
  - enable_gpgcheck_for_all_repositories
  - enable_strategy
  - high_severity
  - low_complexity
  - medium_disruption
  - no_reboot_needed

- name: 'Ensure gpgcheck Is Enabled for All Package Repositories: Set gpgcheck=1 for
    each dnf repo'
  community.general.ini_file:
    path: '{{ item[0] }}'
    section: '{{ item[1] }}'
    option: gpgcheck
    value: '1'
    no_extra_spaces: true
  loop: '{{ repo_grep_results.stdout | regex_findall( ''(.+\.repo):\[(.+)\]\n?'' )
    if repo_grep_results is not skipped else [] }}'
  when: repo_grep_results is not skipped
  tags:
  - enable_gpgcheck_for_all_repositories
  - enable_strategy
  - high_severity
  - low_complexity
  - medium_disruption
  - no_reboot_needed
