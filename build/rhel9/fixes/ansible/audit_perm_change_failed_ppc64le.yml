# platform = multi_platform_all
# reboot = false
# strategy = restrict
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-86000-7
  - NIST-800-53-AU-2(a)
  - audit_perm_change_failed_ppc64le
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy

- name: Put contents into /etc/audit/rules.d/30-ospp-v42-5-perm-change-failed.rules
    according to policy
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/30-ospp-v42-5-perm-change-failed.rules
    content: |
      ## Unsuccessful permission change
      -a always,exit -F arch=b64 -S chmod,fchmod,fchmodat,setxattr,lsetxattr,fsetxattr,removexattr,lremovexattr,fremovexattr -F exit=-EACCES -F auid>=1000 -F auid!=unset -F key=unsuccessful-perm-change
      -a always,exit -F arch=b64 -S chmod,fchmod,fchmodat,setxattr,lsetxattr,fsetxattr,removexattr,lremovexattr,fremovexattr -F exit=-EPERM -F auid>=1000 -F auid!=unset -F key=unsuccessful-perm-change
    force: true
  when:
  - '"kernel-core" in ansible_facts.packages'
  - ansible_architecture == "ppc64le"
  tags:
  - CCE-86000-7
  - NIST-800-53-AU-2(a)
  - audit_perm_change_failed_ppc64le
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy

- name: Configure auditing of unsuccessful permission changes (ppc64le) - Remove any
    permissions from group and other
  ansible.builtin.file:
    path: /etc/audit/rules.d/30-ospp-v42-5-perm-change-failed.rules
    mode: g-rwx,o-rwx
    state: touch
  when:
  - '"kernel-core" in ansible_facts.packages'
  - ansible_architecture == "ppc64le"
  tags:
  - CCE-86000-7
  - NIST-800-53-AU-2(a)
  - audit_perm_change_failed_ppc64le
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy
