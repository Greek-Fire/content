# platform = multi_platform_all
# reboot = false
# strategy = disable
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - disable_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - service_timesyncd_disabled

- name: Disable systemd_timesyncd Service - Disable service systemd-timesyncd
  block:

  - name: Disable systemd_timesyncd Service - Collect systemd Services Present in
      the System
    ansible.builtin.command: systemctl -q list-unit-files --type service
    register: service_exists
    changed_when: false
    failed_when: service_exists.rc not in [0, 1]
    check_mode: false

  - name: Disable systemd_timesyncd Service - Ensure systemd-timesyncd.service is
      Masked
    ansible.builtin.systemd:
      name: systemd-timesyncd.service
      state: stopped
      enabled: false
      masked: true
    when: service_exists.stdout_lines is search("systemd-timesyncd.service", multiline=True)

  - name: Unit Socket Exists - systemd-timesyncd.socket
    ansible.builtin.command: systemctl -q list-unit-files systemd-timesyncd.socket
    register: socket_file_exists
    changed_when: false
    failed_when: socket_file_exists.rc not in [0, 1]
    check_mode: false

  - name: Disable systemd_timesyncd Service - Disable Socket systemd-timesyncd
    ansible.builtin.systemd:
      name: systemd-timesyncd.socket
      enabled: false
      state: stopped
      masked: true
    when: socket_file_exists.stdout_lines is search("systemd-timesyncd.socket", multiline=True)
  tags:
  - disable_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - service_timesyncd_disabled
  - special_service_block
  when:
  - '"kernel-core" in ansible_facts.packages'
  - '"systemd-timesyncd" in ansible_facts.packages'
