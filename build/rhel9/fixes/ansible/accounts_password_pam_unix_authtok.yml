# platform = multi_platform_rhel
# reboot = false
# strategy = configure
# complexity = low
# disruption = medium
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - accounts_password_pam_unix_authtok
  - configure_strategy
  - low_complexity
  - medium_disruption
  - medium_severity
  - no_reboot_needed

- name: Require use_authtok for pam_unix.so - Check if system relies on authselect
    tool
  ansible.builtin.stat:
    path: /usr/bin/authselect
  register: result_authselect_present
  when:
  - '"kernel-core" in ansible_facts.packages'
  - '"pam" in ansible_facts.packages'
  tags:
  - accounts_password_pam_unix_authtok
  - configure_strategy
  - low_complexity
  - medium_disruption
  - medium_severity
  - no_reboot_needed

- name: Require use_authtok for pam_unix.so - Define a fact for control already filtered
    in case filters are used
  ansible.builtin.set_fact:
    pam_module_control: sufficient
  when:
  - '"kernel-core" in ansible_facts.packages'
  - '"pam" in ansible_facts.packages'
  tags:
  - accounts_password_pam_unix_authtok
  - configure_strategy
  - low_complexity
  - medium_disruption
  - medium_severity
  - no_reboot_needed

- name: Require use_authtok for pam_unix.so - Check if expected PAM module line is
    present in /etc/pam.d/system-auth
  ansible.builtin.lineinfile:
    path: /etc/pam.d/system-auth
    regexp: ^\s*password\s+{{ pam_module_control | regex_escape() }}\s+pam_unix.so\s*.*
    state: absent
  check_mode: true
  changed_when: false
  register: result_pam_line_present
  when:
  - '"kernel-core" in ansible_facts.packages'
  - '"pam" in ansible_facts.packages'
  tags:
  - accounts_password_pam_unix_authtok
  - configure_strategy
  - low_complexity
  - medium_disruption
  - medium_severity
  - no_reboot_needed

- name: Require use_authtok for pam_unix.so - Include or update the PAM module line
    in /etc/pam.d/system-auth
  block:

  - name: Require use_authtok for pam_unix.so - Check if required PAM module line
      is present in /etc/pam.d/system-auth with different control
    ansible.builtin.lineinfile:
      path: /etc/pam.d/system-auth
      regexp: ^\s*password\s+.*\s+pam_unix.so\s*
      state: absent
    check_mode: true
    changed_when: false
    register: result_pam_line_other_control_present

  - name: Require use_authtok for pam_unix.so - Ensure the correct control for the
      required PAM module line in /etc/pam.d/system-auth
    ansible.builtin.replace:
      dest: /etc/pam.d/system-auth
      regexp: ^(\s*password\s+).*(\bpam_unix.so.*)
      replace: \1{{ pam_module_control }} \2
    register: result_pam_module_edit
    when:
    - result_pam_line_other_control_present.found == 1

  - name: Require use_authtok for pam_unix.so - Ensure the required PAM module line
      is included in /etc/pam.d/system-auth
    ansible.builtin.lineinfile:
      dest: /etc/pam.d/system-auth
      line: password    {{ pam_module_control }}    pam_unix.so
    register: result_pam_module_add
    when:
    - result_pam_line_other_control_present.found == 0 or result_pam_line_other_control_present.found
      > 1

  - name: Require use_authtok for pam_unix.so - Ensure authselect changes are applied
    ansible.builtin.command:
      cmd: authselect apply-changes -b
    when:
    - result_authselect_present is defined
    - result_authselect_present.stat.exists
    - |-
      (result_pam_module_add is defined and result_pam_module_add.changed)
       or (result_pam_module_edit is defined and result_pam_module_edit.changed)
  when:
  - '"kernel-core" in ansible_facts.packages'
  - '"pam" in ansible_facts.packages'
  - result_pam_line_present.found is defined
  - result_pam_line_present.found == 0
  tags:
  - accounts_password_pam_unix_authtok
  - configure_strategy
  - low_complexity
  - medium_disruption
  - medium_severity
  - no_reboot_needed

- name: Require use_authtok for pam_unix.so - Define a fact for control already filtered
    in case filters are used
  ansible.builtin.set_fact:
    pam_module_control: sufficient
  when:
  - '"kernel-core" in ansible_facts.packages'
  - '"pam" in ansible_facts.packages'
  tags:
  - accounts_password_pam_unix_authtok
  - configure_strategy
  - low_complexity
  - medium_disruption
  - medium_severity
  - no_reboot_needed

- name: Require use_authtok for pam_unix.so - Check if the required PAM module option
    is present in /etc/pam.d/system-auth
  ansible.builtin.lineinfile:
    path: /etc/pam.d/system-auth
    regexp: ^\s*password\s+{{ pam_module_control | regex_escape() }}\s+pam_unix.so\s*.*\suse_authtok\b
    state: absent
  check_mode: true
  changed_when: false
  register: result_pam_module_accounts_password_pam_unix_authtok_option_present
  when:
  - '"kernel-core" in ansible_facts.packages'
  - '"pam" in ansible_facts.packages'
  tags:
  - accounts_password_pam_unix_authtok
  - configure_strategy
  - low_complexity
  - medium_disruption
  - medium_severity
  - no_reboot_needed

- name: Require use_authtok for pam_unix.so - Ensure the "use_authtok" PAM option
    for "pam_unix.so" is included in /etc/pam.d/system-auth
  ansible.builtin.lineinfile:
    path: /etc/pam.d/system-auth
    backrefs: true
    regexp: ^(\s*password\s+{{ pam_module_control | regex_escape() }}\s+pam_unix.so.*)
    line: \1 use_authtok
    state: present
  register: result_pam_accounts_password_pam_unix_authtok_add
  when:
  - '"kernel-core" in ansible_facts.packages'
  - '"pam" in ansible_facts.packages'
  - result_pam_module_accounts_password_pam_unix_authtok_option_present.found is defined
  - result_pam_module_accounts_password_pam_unix_authtok_option_present.found == 0
  tags:
  - accounts_password_pam_unix_authtok
  - configure_strategy
  - low_complexity
  - medium_disruption
  - medium_severity
  - no_reboot_needed

- name: Require use_authtok for pam_unix.so - Define a fact for control already filtered
    in case filters are used
  ansible.builtin.set_fact:
    pam_module_control: sufficient
  when:
  - '"kernel-core" in ansible_facts.packages'
  - '"pam" in ansible_facts.packages'
  tags:
  - accounts_password_pam_unix_authtok
  - configure_strategy
  - low_complexity
