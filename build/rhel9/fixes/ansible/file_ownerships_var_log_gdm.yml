# platform = multi_platform_all
# reboot = false
# strategy = configure
# complexity = low
# disruption = low
- name: Set the file_ownerships_var_log_gdm_newown variable if represented by uid
  ansible.builtin.set_fact:
    file_ownerships_var_log_gdm_newown: '0'
  tags:
  - configure_strategy
  - file_ownerships_var_log_gdm
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Find /var/log/gdm/ file(s) matching .* recursively
  ansible.builtin.command: find -P /var/log/gdm/  -type f  ! -user 0 -regextype posix-extended
    -regex ".*"
  register: files_found
  changed_when: false
  failed_when: false
  check_mode: false
  tags:
  - configure_strategy
  - file_ownerships_var_log_gdm
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Ensure owner on /var/log/gdm/ file(s) matching .*
  ansible.builtin.file:
    path: '{{ item }}'
    follow: false
    owner: '{{ file_ownerships_var_log_gdm_newown }}'
    state: file
  with_items:
  - '{{ files_found.stdout_lines }}'
  tags:
  - configure_strategy
  - file_ownerships_var_log_gdm
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
