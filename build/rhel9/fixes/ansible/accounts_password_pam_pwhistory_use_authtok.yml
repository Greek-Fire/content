# platform = multi_platform_rhel
# reboot = false
# strategy = configure
# complexity = low
# disruption = medium
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - accounts_password_pam_pwhistory_use_authtok
  - configure_strategy
  - low_complexity
  - medium_disruption
  - medium_severity
  - no_reboot_needed

- name: Enforce Password History with use_authtok - Check if system relies on authselect
    tool
  ansible.builtin.stat:
    path: /usr/bin/authselect
  register: result_authselect_present
  when:
  - '"kernel-core" in ansible_facts.packages'
  - '"pam" in ansible_facts.packages'
  tags:
  - accounts_password_pam_pwhistory_use_authtok
  - configure_strategy
  - low_complexity
  - medium_disruption
  - medium_severity
  - no_reboot_needed

- name: Enforce Password History with use_authtok - Ensure authselect custom profile
    is used if authselect is present
  block:

  - name: Enforce Password History with use_authtok - Check integrity of authselect
      current profile
    ansible.builtin.command:
      cmd: authselect check
    register: result_authselect_check_cmd
    changed_when: false
    check_mode: false
    failed_when: false

  - name: Enforce Password History with use_authtok - Informative message based on
      the authselect integrity check result
    ansible.builtin.assert:
      that:
      - ansible_check_mode or result_authselect_check_cmd.rc == 0
      fail_msg:
      - authselect integrity check failed. Remediation aborted!
      - This remediation could not be applied because an authselect profile was not
        selected or the selected profile is not intact.
      - It is not recommended to manually edit the PAM files when authselect tool
        is available.
      - In cases where the default authselect profile does not cover a specific demand,
        a custom authselect profile is recommended.
      success_msg:
      - authselect integrity check passed

  - name: Enforce Password History with use_authtok - Get authselect current profile
    ansible.builtin.shell:
      cmd: authselect current -r | awk '{ print $1 }'
    register: result_authselect_profile
    changed_when: false
    when:
    - result_authselect_check_cmd is success

  - name: Enforce Password History with use_authtok - Define the current authselect
      profile as a local fact
    ansible.builtin.set_fact:
      authselect_current_profile: '{{ result_authselect_profile.stdout }}'
      authselect_custom_profile: '{{ result_authselect_profile.stdout }}'
    when:
    - result_authselect_profile is not skipped
    - result_authselect_profile.stdout is match("custom/")

  - name: Enforce Password History with use_authtok - Define the new authselect custom
      profile as a local fact
    ansible.builtin.set_fact:
      authselect_current_profile: '{{ result_authselect_profile.stdout }}'
      authselect_custom_profile: custom/hardening
    when:
    - result_authselect_profile is not skipped
    - result_authselect_profile.stdout is not match("custom/")

  - name: Enforce Password History with use_authtok - Get authselect current features
      to also enable them in the custom profile
    ansible.builtin.shell:
      cmd: authselect current | tail -n+3 | awk '{ print $2 }'
    register: result_authselect_features
    changed_when: false
    check_mode: false
    when:
    - result_authselect_profile is not skipped
    - authselect_current_profile is not match("custom/")

  - name: Enforce Password History with use_authtok - Check if any custom profile
      with the same name was already created
    ansible.builtin.stat:
      path: /etc/authselect/{{ authselect_custom_profile }}
    register: result_authselect_custom_profile_present
    changed_when: false
    when:
    - result_authselect_profile is not skipped
    - authselect_current_profile is not match("custom/")

  - name: Enforce Password History with use_authtok - Create an authselect custom
      profile based on the current profile
    ansible.builtin.command:
      cmd: authselect create-profile hardening -b {{ authselect_current_profile }}
    when:
    - result_authselect_profile is not skipped
    - result_authselect_check_cmd is success
    - authselect_current_profile is not match("^(custom/|local)")
    - not result_authselect_custom_profile_present.stat.exists

  - name: Enforce Password History with use_authtok - Create an authselect custom
      profile based on sssd profile
    ansible.builtin.command:
      cmd: authselect create-profile hardening -b sssd
    when:
    - result_authselect_profile is not skipped
    - result_authselect_check_cmd is success
    - authselect_current_profile is match("local")
    - not result_authselect_custom_profile_present.stat.exists

  - name: Enforce Password History with use_authtok - Ensure authselect changes are
      applied
    ansible.builtin.command:
      cmd: authselect apply-changes -b --backup=before-hardening-custom-profile
    when:
    - result_authselect_check_cmd is success
    - result_authselect_profile is not skipped
    - authselect_current_profile is not match("custom/")
    - authselect_custom_profile is not match(authselect_current_profile)

  - name: Enforce Password History with use_authtok - Ensure the authselect custom
      profile is selected
    ansible.builtin.command:
      cmd: authselect select {{ authselect_custom_profile }}
    register: result_pam_authselect_select_profile
    when:
    - result_authselect_check_cmd is success
    - result_authselect_profile is not skipped
    - authselect_current_profile is not match("custom/")
    - authselect_custom_profile is not match(authselect_current_profile)

  - name: Enforce Password History with use_authtok - Restore the authselect features
      in the custom profile
    ansible.builtin.command:
      cmd: authselect enable-feature {{ item }}
    loop: '{{ result_authselect_features.stdout_lines }}'
    register: result_pam_authselect_restore_features
    when:
    - result_authselect_profile is not skipped
    - result_authselect_features is not skipped
    - result_pam_authselect_select_profile is not skipped

  - name: Enforce Password History with use_authtok - Ensure authselect changes are
      applied
    ansible.builtin.command:
      cmd: authselect apply-changes -b --backup=after-hardening-custom-profile
    when:
    - result_authselect_check_cmd is success
    - result_authselect_profile is not skipped
    - result_pam_authselect_restore_features is not skipped
  when:
  - '"kernel-core" in ansible_facts.packages'
  - '"pam" in ansible_facts.packages'
  - result_authselect_present.stat.exists
  tags:
  - accounts_password_pam_pwhistory_use_authtok
  - configure_strategy
  - low_complexity
  - medium_disruption
  - medium_severity
  - no_reboot_needed

- name: Enforce Password History with use_authtok - Get authselect current profile
  ansible.builtin.shell:
    cmd: authselect current -r | awk '{ print $1 }'
  register: result_authselect_profile
  changed_when: false
  when:
  - '"kernel-core" in ansible_facts.packages'
  - '"pam" in ansible_facts.packages'
  - result_authselect_check_cmd is success
  tags:
  - accounts_password_pam_pwhistory_use_authtok
  - configure_strategy
  - low_complexity
  - medium_disruption
  - medium_severity
  - no_reboot_needed

- name: Enforce Password History with use_authtok - Define the PAM profile path based
    on the authselect profile
  ansible.builtin.set_fact:
    pam_profile_path: '{%- if result_authselect_profile.stdout is match("^custom/")
      -%} /etc/authselect/{{ result_authselect_profile.stdout }} {%- else -%} /usr/share/authselect/default/{{
      result_authselect_profile.stdout }} {%- endif -%}'
  when:
  - '"kernel-core" in ansible_facts.packages'
  - '"pam" in ansible_facts.packages'
  - result_authselect_check_cmd is success
  - result_authselect_profile is not skipped
  tags:
  - accounts_password_pam_pwhistory_use_authtok
  - configure_strategy
  - low_complexity
  - medium_disruption
  - medium_severity
  - no_reboot_needed

- name: Enforce Password History with use_authtok - Check if "use_authtok" option
    is present in pam_pwhistory.so in /password-auth
  ansible.builtin.lineinfile:
    path: '{{ pam_profile_path }}/password-auth'
    regexp: ^\s*password\s+([^#\n\r]+)\s+pam_pwhistory\.so\s+([^#\n\r]+\s+)?use_authtok\b
    state: absent
  check_mode: true
  changed_when: false
  register: result_pam_pwhistory_password_auth_option_present
  when:
  - '"kernel-core" in ansible_facts.packages'
  - '"pam" in ansible_facts.packages'
  - result_authselect_check_cmd is success
  - result_authselect_profile is not skipped
  - pam_profile_path is defined
  tags:
  - accounts_password_pam_pwhistory_use_authtok
  - configure_strategy
  - low_complexity
  - medium_disruption
  - medium_severity
  - no_reboot_needed

- name: Enforce Password History with use_authtok - Ensure "use_authtok" option is
    added to pam_pwhistory.so in /password-auth
  ansible.builtin.replace:
    path: '{{ pam_profile_path }}/password-auth'
    regexp: (^\s*password\s+(requisite|required|sufficient)\s+pam_pwhistory\.so\s+.*)$
    replace: \1 use_authtok
  register: result_pam_pwhistory_password_auth_add
  when:
  - '"kernel-core" in ansible_facts.packages'
  - '"pam" in ansible_facts.packages'
  - result_authselect_check_cmd is success
  - result_authselect_profile is not skipped
  - pam_profile_path is defined
  - result_pam_pwhistory_password_auth_option_present.found is defined
  - result_pam_pwhistory_password_auth_option_present.found == 0
  tags:
  - accounts_password_pam_pwhistory_use_authtok
  - configure_strategy
  - low_complexity
  - medium_disruption
  - medium_severity
  - no_reboot_needed

- name: Enforce Password History with use_authtok - Check if "use_authtok" option
    is present in pam_pwhistory.so in /system-auth
  ansible.builtin.lineinfile:
    path: '{{ pam_profile_path }}/system-auth'
    regexp: ^\s*password\s+([^#\n\r]+)\s+pam_pwhistory\.so\s+([^#\n\r]+\s+)?use_authtok\b
    state: absent
  check_mode: true
  changed_when: false
  register: result_pam_pwhistory_system_auth_option_present
  when:
  - '"kernel-core" in ansible_facts.packages'
  - '"pam" in ansible_facts.packages'
  - result_authselect_check_cmd is success
  - result_authselect_profile is not skipped
  - pam_profile_path is defined
  tags:
  - accounts_password_pam_pwhistory_use_authtok
  - configure_strategy
  - low_complexity
  - medium_disruption
  - medium_severity
  - no_reboot_needed

- name: Enforce Password History with use_authtok - Ensure "use_authtok" option is
    added to pam_pwhistory.so in /system-auth
  ansible.builtin.replace:
    path: '{{ pam_profile_path }}/system-auth'
    regexp: (^\s*password\s+(requisite|required|sufficient)\s+pam_pwhistory\.so\s+.*)$
    replace: \1 use_authtok
  register: result_pam_pwhistory_system_auth_add
  when:
  - '"kernel-core" in ansible_facts.packages'
  - '"pam" in ansible_facts.packages'
  - result_authselect_check_cmd is success
  - result_authselect_profile is not skipped
  - pam_profile_path is defined
  - result_pam_pwhistory_system_auth_option_present.found is defined
  - result_pam_pwhistory_system_auth_option_present.found == 0
  tags:
  - accounts_password_pam_pwhistory_use_authtok
  - configure_strategy
  - low_complexity
  - medium_disruption
  - medium_severity
  - no_reboot_needed

- name: Enforce Password History with use_authtok - Ensure authselect changes are
    applied
  ansible.builtin.command:
    cmd: authselect apply-changes -b
  when:
  - '"kernel-core" in ansible_facts.packages'
  - '"pam" in ansible_facts.packages'
  - result_authselect_check_cmd is success
  - result_authselect_profile is not skipped
  - |-
    (result_pam_pwhistory_password_auth_add is defined and result_pam_pwhistory_password_auth_add.changed)
     or (result_pam_pwhistory_system_auth_add is defined and result_pam_pwhistory_system_auth_add.changed)
  tags:
  - accounts_password_pam_pwhistory_use_authtok
  - configure_strategy
  - low_complexity
  - medium_disruption
  - medium_severity
  - no_reboot_needed
