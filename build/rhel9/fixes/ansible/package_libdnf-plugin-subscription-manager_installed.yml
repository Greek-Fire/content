# platform = multi_platform_all
# reboot = false
# strategy = enable
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - enable_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - package_libdnf-plugin-subscription-manager_installed

- name: Ensure libdnf-plugin-subscription-manager is installed
  ansible.builtin.package:
    name: libdnf-plugin-subscription-manager
    state: present
  when: '"dnf" in ansible_facts.packages'
  tags:
  - enable_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - package_libdnf-plugin-subscription-manager_installed
