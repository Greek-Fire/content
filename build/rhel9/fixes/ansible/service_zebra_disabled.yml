# platform = multi_platform_all
# reboot = false
# strategy = disable
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - NIST-800-53-CM-6(a)
  - NIST-800-53-CM-7(a)
  - NIST-800-53-CM-7(b)
  - disable_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - service_zebra_disabled

- name: Disable Quagga Service - Disable service zebra
  block:

  - name: Disable Quagga Service - Collect systemd Services Present in the System
    ansible.builtin.command: systemctl -q list-unit-files --type service
    register: service_exists
    changed_when: false
    failed_when: service_exists.rc not in [0, 1]
    check_mode: false

  - name: Disable Quagga Service - Ensure zebra.service is Masked
    ansible.builtin.systemd:
      name: zebra.service
      state: stopped
      enabled: false
      masked: true
    when: service_exists.stdout_lines is search("zebra.service", multiline=True)

  - name: Unit Socket Exists - zebra.socket
    ansible.builtin.command: systemctl -q list-unit-files zebra.socket
    register: socket_file_exists
    changed_when: false
    failed_when: socket_file_exists.rc not in [0, 1]
    check_mode: false

  - name: Disable Quagga Service - Disable Socket zebra
    ansible.builtin.systemd:
      name: zebra.socket
      enabled: false
      state: stopped
      masked: true
    when: socket_file_exists.stdout_lines is search("zebra.socket", multiline=True)
  tags:
  - NIST-800-53-CM-6(a)
  - NIST-800-53-CM-7(a)
  - NIST-800-53-CM-7(b)
  - disable_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - service_zebra_disabled
  - special_service_block
  when: '"kernel-core" in ansible_facts.packages'
