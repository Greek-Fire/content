# platform = multi_platform_rhel,multi_platform_fedora,multi_platform_ol,multi_platform_almalinux
# reboot = false
# strategy = unknown
# complexity = low
# disruption = medium
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-88714-1
  - NIST-800-53-CM-6(a)
  - NIST-800-53-CM-7(a)
  - NIST-800-53-CM-7(b)
  - dconf_gnome_disable_thumbnailers
  - low_complexity
  - medium_disruption
  - no_reboot_needed
  - unknown_severity
  - unknown_strategy

- name: Disable All GNOME3 Thumbnailers
  community.general.ini_file:
    dest: /etc/dconf/db/local.d/00-security-settings
    section: org/gnome/desktop/thumbnailers
    option: disable-all
    value: 'true'
    create: true
    no_extra_spaces: true
  register: result_ini
  when: '"gdm" in ansible_facts.packages'
  tags:
  - CCE-88714-1
  - NIST-800-53-CM-6(a)
  - NIST-800-53-CM-7(a)
  - NIST-800-53-CM-7(b)
  - dconf_gnome_disable_thumbnailers
  - low_complexity
  - medium_disruption
  - no_reboot_needed
  - unknown_severity
  - unknown_strategy

- name: Prevent user modification of GNOME3 Thumbnailers
  ansible.builtin.lineinfile:
    path: /etc/dconf/db/local.d/locks/00-security-settings-lock
    regexp: ^/org/gnome/desktop/thumbnailers/disable-all$
    line: /org/gnome/desktop/thumbnailers/disable-all
    create: true
  register: result_lineinfile
  when: '"gdm" in ansible_facts.packages'
  tags:
  - CCE-88714-1
  - NIST-800-53-CM-6(a)
  - NIST-800-53-CM-7(a)
  - NIST-800-53-CM-7(b)
  - dconf_gnome_disable_thumbnailers
  - low_complexity
  - medium_disruption
  - no_reboot_needed
  - unknown_severity
  - unknown_strategy

- name: Dconf Update
  ansible.builtin.command: dconf update
  when:
  - '"gdm" in ansible_facts.packages'
  - result_ini is changed or result_lineinfile is changed
  tags:
  - CCE-88714-1
  - NIST-800-53-CM-6(a)
  - NIST-800-53-CM-7(a)
  - NIST-800-53-CM-7(b)
  - dconf_gnome_disable_thumbnailers
  - low_complexity
  - medium_disruption
  - no_reboot_needed
  - unknown_severity
  - unknown_strategy
