# platform = multi_platform_all
# reboot = false
# strategy = configure
# complexity = low
# disruption = low
- name: Check that the sssd group is defined
  ansible.builtin.getent:
    database: group
    key: sssd
  ignore_errors: true
  when: file_groupownerships_var_log_sssd_newgroup is undefined
  tags:
  - configure_strategy
  - file_groupownerships_var_log_sssd
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Set the file_groupownerships_var_log_sssd_newgroup variable if sssd found
  ansible.builtin.set_fact:
    file_groupownerships_var_log_sssd_newgroup: sssd
  when: ansible_facts.getent_group["sssd"] is defined
  tags:
  - configure_strategy
  - file_groupownerships_var_log_sssd
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Check that the root group is defined
  ansible.builtin.getent:
    database: group
    key: root
  ignore_errors: true
  when: file_groupownerships_var_log_sssd_newgroup is undefined
  tags:
  - configure_strategy
  - file_groupownerships_var_log_sssd
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Set the file_groupownerships_var_log_sssd_newgroup variable if root found
  ansible.builtin.set_fact:
    file_groupownerships_var_log_sssd_newgroup: root
  when: ansible_facts.getent_group["root"] is defined
  tags:
  - configure_strategy
  - file_groupownerships_var_log_sssd
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Find /var/log/sssd/ file(s) matching .* recursively
  ansible.builtin.command: find -P /var/log/sssd/  -type f  ! -group sssd ! -group
    root -regextype posix-extended -regex ".*"
  register: files_found
  changed_when: false
  failed_when: false
  check_mode: false
  tags:
  - configure_strategy
  - file_groupownerships_var_log_sssd
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Ensure group owner on /var/log/sssd/ file(s) matching .*
  ansible.builtin.file:
    path: '{{ item }}'
    follow: false
    group: '{{ file_groupownerships_var_log_sssd_newgroup }}'
    state: file
  with_items:
  - '{{ files_found.stdout_lines }}'
  tags:
  - configure_strategy
  - file_groupownerships_var_log_sssd
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
