# platform = Red Hat Virtualization 4,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_sle,multi_platform_slmicro,multi_platform_almalinux
# reboot = false
# strategy = restrict
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-83641-1
  - CJIS-5.5.2.2
  - DISA-STIG-RHEL-09-412040
  - NIST-800-53-AC-10
  - NIST-800-53-CM-6(a)
  - accounts_max_concurrent_login_sessions
  - low_complexity
  - low_disruption
  - low_severity
  - no_reboot_needed
  - restrict_strategy
- (xccdf-var var_accounts_max_concurrent_login_sessions)

- name: Find /etc/security/limits.d files containing maxlogins configuration
  ansible.builtin.find:
    paths: /etc/security/limits.d
    contains: ^[\s]*\*[\s]+(?:(?:hard)|(?:-))[\s]+maxlogins
    patterns: '*.conf'
  register: maxlogins
  when: ( "pam" in ansible_facts.packages and "kernel-core" in ansible_facts.packages
    )
  tags:
  - CCE-83641-1
  - CJIS-5.5.2.2
  - DISA-STIG-RHEL-09-412040
  - NIST-800-53-AC-10
  - NIST-800-53-CM-6(a)
  - accounts_max_concurrent_login_sessions
  - low_complexity
  - low_disruption
  - low_severity
  - no_reboot_needed
  - restrict_strategy

- name: Limit the Number of Concurrent Login Sessions Allowed Per User in files from
    limits.d
  ansible.builtin.replace:
    dest: '{{ item.path }}'
    regexp: ^#?\*.*maxlogins.*
    replace: '*          hard    maxlogins     {{ var_accounts_max_concurrent_login_sessions
      }}'
  with_items:
  - '{{ maxlogins.files }}'
  when: ( "pam" in ansible_facts.packages and "kernel-core" in ansible_facts.packages
    )
  tags:
  - CCE-83641-1
  - CJIS-5.5.2.2
  - DISA-STIG-RHEL-09-412040
  - NIST-800-53-AC-10
  - NIST-800-53-CM-6(a)
  - accounts_max_concurrent_login_sessions
  - low_complexity
  - low_disruption
  - low_severity
  - no_reboot_needed
  - restrict_strategy

- name: Limit the Number of Concurrent Login Sessions Allowed Per User
  ansible.builtin.lineinfile:
    state: present
    dest: /etc/security/limits.conf
    insertbefore: ^# End of file
    regexp: ^#?\*.*maxlogins
    line: '*          hard    maxlogins     {{ var_accounts_max_concurrent_login_sessions
      }}'
    create: true
  when:
  - ( "pam" in ansible_facts.packages and "kernel-core" in ansible_facts.packages
    )
  - maxlogins.matched == 0
  tags:
  - CCE-83641-1
  - CJIS-5.5.2.2
  - DISA-STIG-RHEL-09-412040
  - NIST-800-53-AC-10
  - NIST-800-53-CM-6(a)
  - accounts_max_concurrent_login_sessions
  - low_complexity
  - low_disruption
  - low_severity
  - no_reboot_needed
  - restrict_strategy
