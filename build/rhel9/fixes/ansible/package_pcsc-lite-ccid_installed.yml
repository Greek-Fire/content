# platform = multi_platform_all
# reboot = false
# strategy = enable
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-86246-6
  - NIST-800-53-CM-6(a)
  - enable_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - package_pcsc-lite-ccid_installed

- name: Ensure pcsc-lite-ccid is installed
  ansible.builtin.package:
    name: pcsc-lite-ccid
    state: present
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-86246-6
  - NIST-800-53-CM-6(a)
  - enable_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - package_pcsc-lite-ccid_installed
