# platform = multi_platform_slmicro,multi_platform_rhel,multi_platform_fedora
# reboot = false
# strategy = restrict
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-86762-2
  - file_etc_security_opasswd
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy

- name: Verify Permissions and Ownership of Old Passwords File
  ansible.builtin.file:
    path: /etc/security/opasswd
    owner: root
    group: root
    mode: 384
    state: touch
    modification_time: preserve
    access_time: preserve
  when: '"pam" in ansible_facts.packages'
  tags:
  - CCE-86762-2
  - file_etc_security_opasswd
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy
