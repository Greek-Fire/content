# platform = multi_platform_all
# reboot = false
# strategy = disable
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-84072-8
  - disable_strategy
  - low_complexity
  - low_disruption
  - low_severity
  - no_reboot_needed
  - package_mcstrans_removed

- name: 'Uninstall mcstrans Package: Ensure mcstrans is removed'
  ansible.builtin.package:
    name: mcstrans
    state: absent
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-84072-8
  - disable_strategy
  - low_complexity
  - low_disruption
  - low_severity
  - no_reboot_needed
  - package_mcstrans_removed
