# platform = multi_platform_all
# reboot = false
# strategy = enable
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-89706-6
  - DISA-STIG-RHEL-09-215085
  - enable_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - package_nss-tools_installed

- name: Ensure nss-tools is installed
  ansible.builtin.package:
    name: nss-tools
    state: present
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-89706-6
  - DISA-STIG-RHEL-09-215085
  - enable_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - package_nss-tools_installed
