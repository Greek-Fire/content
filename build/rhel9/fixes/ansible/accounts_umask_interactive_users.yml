# platform = multi_platform_rhel,multi_platform_ol,multi_platform_sle,multi_platform_rhv4,multi_platform_almalinux
# reboot = false
# strategy = restrict
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-90365-8
  - DISA-STIG-RHEL-09-411025
  - accounts_umask_interactive_users
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy

- name: Ensure the Default Umask is Set Correctly For Interactive Users - Get interactive
    users from passwd file
  ansible.builtin.getent:
    database: passwd
  register: passwd_entries
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-90365-8
  - DISA-STIG-RHEL-09-411025
  - accounts_umask_interactive_users
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy

- name: Ensure the Default Umask is Set Correctly For Interactive Users - Filter interactive
    users and get home directories
  ansible.builtin.set_fact:
    interactive_user_homes: '{{ interactive_user_homes | default([]) + [item.value[4]]
      }}'
  loop: '{{ passwd_entries.ansible_facts.getent_passwd | dict2items }}'
  when:
  - '"kernel-core" in ansible_facts.packages'
  - item.value[2] | int >= 1000 | int
  - item.value[2] | int != 65534 | int
  - item.value[4] != ""
  tags:
  - CCE-90365-8
  - DISA-STIG-RHEL-09-411025
  - accounts_umask_interactive_users
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy

- name: Ensure the Default Umask is Set Correctly For Interactive Users - Find dot
    files in interactive user home directories
  ansible.builtin.find:
    paths: '{{ item }}'
    patterns: .*
    file_type: file
    hidden: true
    depth: 1
  register: user_dotfiles
  with_items: '{{ interactive_user_homes | default([]) }}'
  failed_when: false
  when:
  - '"kernel-core" in ansible_facts.packages'
  - item != ""
  tags:
  - CCE-90365-8
  - DISA-STIG-RHEL-09-411025
  - accounts_umask_interactive_users
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy

- name: Ensure the Default Umask is Set Correctly For Interactive Users - Comment
    out umask statements in user initialization files
  ansible.builtin.replace:
    path: '{{ item.1.path }}'
    regexp: ^\s*umask\s+
    replace: '#\g<0>'
    backup: false
  with_subelements:
  - '{{ user_dotfiles.results }}'
  - files
  when:
  - '"kernel-core" in ansible_facts.packages'
  - item.0 is not skipped
  - item.1.path is defined
  - '''.bash_history'' not in item.1.path'
  tags:
  - CCE-90365-8
  - DISA-STIG-RHEL-09-411025
  - accounts_umask_interactive_users
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy
