# platform = multi_platform_all
# reboot = false
# strategy = disable
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-84231-0
  - NIST-800-53-CM-6(a)
  - NIST-800-53-CM-7(a)
  - NIST-800-53-CM-7(b)
  - disable_strategy
  - low_complexity
  - low_disruption
  - low_severity
  - no_reboot_needed
  - service_qpidd_disabled

- name: Disable Apache Qpid (qpidd) - Disable service qpidd
  block:

  - name: Disable Apache Qpid (qpidd) - Collect systemd Services Present in the System
    ansible.builtin.command: systemctl -q list-unit-files --type service
    register: service_exists
    changed_when: false
    failed_when: service_exists.rc not in [0, 1]
    check_mode: false

  - name: Disable Apache Qpid (qpidd) - Ensure qpidd.service is Masked
    ansible.builtin.systemd:
      name: qpidd.service
      state: stopped
      enabled: false
      masked: true
    when: service_exists.stdout_lines is search("qpidd.service", multiline=True)

  - name: Unit Socket Exists - qpidd.socket
    ansible.builtin.command: systemctl -q list-unit-files qpidd.socket
    register: socket_file_exists
    changed_when: false
    failed_when: socket_file_exists.rc not in [0, 1]
    check_mode: false

  - name: Disable Apache Qpid (qpidd) - Disable Socket qpidd
    ansible.builtin.systemd:
      name: qpidd.socket
      enabled: false
      state: stopped
      masked: true
    when: socket_file_exists.stdout_lines is search("qpidd.socket", multiline=True)
  tags:
  - CCE-84231-0
  - NIST-800-53-CM-6(a)
  - NIST-800-53-CM-7(a)
  - NIST-800-53-CM-7(b)
  - disable_strategy
  - low_complexity
  - low_disruption
  - low_severity
  - no_reboot_needed
  - service_qpidd_disabled
  - special_service_block
  when: '"kernel-core" in ansible_facts.packages'
