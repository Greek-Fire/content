# platform = multi_platform_all
# reboot = false
# strategy = disable
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-84213-8
  - NIST-800-53-CM-6(a)
  - NIST-800-53-CM-7(a)
  - NIST-800-53-CM-7(b)
  - disable_strategy
  - low_complexity
  - low_disruption
  - no_reboot_needed
  - service_httpd_disabled
  - unknown_severity

- name: Disable httpd Service - Disable service httpd
  block:

  - name: Disable httpd Service - Collect systemd Services Present in the System
    ansible.builtin.command: systemctl -q list-unit-files --type service
    register: service_exists
    changed_when: false
    failed_when: service_exists.rc not in [0, 1]
    check_mode: false

  - name: Disable httpd Service - Ensure httpd.service is Masked
    ansible.builtin.systemd:
      name: httpd.service
      state: stopped
      enabled: false
      masked: true
    when: service_exists.stdout_lines is search("httpd.service", multiline=True)

  - name: Unit Socket Exists - httpd.socket
    ansible.builtin.command: systemctl -q list-unit-files httpd.socket
    register: socket_file_exists
    changed_when: false
    failed_when: socket_file_exists.rc not in [0, 1]
    check_mode: false

  - name: Disable httpd Service - Disable Socket httpd
    ansible.builtin.systemd:
      name: httpd.socket
      enabled: false
      state: stopped
      masked: true
    when: socket_file_exists.stdout_lines is search("httpd.socket", multiline=True)
  tags:
  - CCE-84213-8
  - NIST-800-53-CM-6(a)
  - NIST-800-53-CM-7(a)
  - NIST-800-53-CM-7(b)
  - disable_strategy
  - low_complexity
  - low_disruption
  - no_reboot_needed
  - service_httpd_disabled
  - special_service_block
  - unknown_severity
  when: '"kernel-core" in ansible_facts.packages'
