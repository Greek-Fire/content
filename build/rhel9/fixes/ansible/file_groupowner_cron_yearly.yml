# platform = multi_platform_all
# reboot = false
# strategy = configure
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - NIST-800-53-AC-6(1)
  - NIST-800-53-CM-6(a)
  - configure_strategy
  - file_groupowner_cron_yearly
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Set the file_groupowner_cron_yearly_newgroup variable if represented by gid
  ansible.builtin.set_fact:
    file_groupowner_cron_yearly_newgroup: '0'
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - NIST-800-53-AC-6(1)
  - NIST-800-53-CM-6(a)
  - configure_strategy
  - file_groupowner_cron_yearly
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Ensure group owner on /etc/cron.yearly/
  ansible.builtin.file:
    path: /etc/cron.yearly/
    follow: false
    state: directory
    group: '{{ file_groupowner_cron_yearly_newgroup }}'
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - NIST-800-53-AC-6(1)
  - NIST-800-53-CM-6(a)
  - configure_strategy
  - file_groupowner_cron_yearly
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
