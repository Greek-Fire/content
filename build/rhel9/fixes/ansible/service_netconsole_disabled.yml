# platform = multi_platform_all
# reboot = false
# strategy = disable
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - NIST-800-53-CM-6(a)
  - NIST-800-53-CM-7(a)
  - NIST-800-53-CM-7(b)
  - disable_strategy
  - low_complexity
  - low_disruption
  - low_severity
  - no_reboot_needed
  - service_netconsole_disabled

- name: Disable Network Console (netconsole) - Disable service netconsole
  block:

  - name: Disable Network Console (netconsole) - Collect systemd Services Present
      in the System
    ansible.builtin.command: systemctl -q list-unit-files --type service
    register: service_exists
    changed_when: false
    failed_when: service_exists.rc not in [0, 1]
    check_mode: false

  - name: Disable Network Console (netconsole) - Ensure netconsole.service is Masked
    ansible.builtin.systemd:
      name: netconsole.service
      state: stopped
      enabled: false
      masked: true
    when: service_exists.stdout_lines is search("netconsole.service", multiline=True)

  - name: Unit Socket Exists - netconsole.socket
    ansible.builtin.command: systemctl -q list-unit-files netconsole.socket
    register: socket_file_exists
    changed_when: false
    failed_when: socket_file_exists.rc not in [0, 1]
    check_mode: false

  - name: Disable Network Console (netconsole) - Disable Socket netconsole
    ansible.builtin.systemd:
      name: netconsole.socket
      enabled: false
      state: stopped
      masked: true
    when: socket_file_exists.stdout_lines is search("netconsole.socket", multiline=True)
  tags:
  - NIST-800-53-CM-6(a)
  - NIST-800-53-CM-7(a)
  - NIST-800-53-CM-7(b)
  - disable_strategy
  - low_complexity
  - low_disruption
  - low_severity
  - no_reboot_needed
  - service_netconsole_disabled
  - special_service_block
  when: '"kernel-core" in ansible_facts.packages'
