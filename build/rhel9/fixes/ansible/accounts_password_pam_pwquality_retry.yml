# platform = multi_platform_all
# reboot = false
# strategy = restrict
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-86502-2
  - DISA-STIG-RHEL-09-611010
  - accounts_password_pam_pwquality_retry
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy
- (xccdf-var var_password_pam_retry)

- name: Ensure PAM Enforces Password Requirements - Authentication Retry Prompts Permitted
    Per-Session in /etc/security/pwquality.conf - Find pwquality.conf.d files
  ansible.builtin.find:
    paths: /etc/security/pwquality.conf.d/
    patterns: '*.conf'
  register: pwquality_conf_d_files
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-86502-2
  - DISA-STIG-RHEL-09-611010
  - accounts_password_pam_pwquality_retry
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy

- name: Ensure PAM Enforces Password Requirements - Authentication Retry Prompts Permitted
    Per-Session in /etc/security/pwquality.conf - Ensure retry is not set in pwquality.conf.d
  ansible.builtin.lineinfile:
    path: '{{ item.path }}'
    regexp: ^\s*\bretry\b.*
    state: absent
  with_items: '{{ pwquality_conf_d_files.files }}'
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-86502-2
  - DISA-STIG-RHEL-09-611010
  - accounts_password_pam_pwquality_retry
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy

- name: Ensure PAM Enforces Password Requirements - Authentication Retry Prompts Permitted
    Per-Session in /etc/security/pwquality.conf - Ensure PAM variable retry is set
    accordingly
  ansible.builtin.lineinfile:
    create: true
    dest: /etc/security/pwquality.conf
    regexp: ^#?\s*retry
    line: retry = {{ var_password_pam_retry }}
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-86502-2
  - DISA-STIG-RHEL-09-611010
  - accounts_password_pam_pwquality_retry
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy
