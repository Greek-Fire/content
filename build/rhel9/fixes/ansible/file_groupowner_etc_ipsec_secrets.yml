# platform = multi_platform_all
# reboot = false
# strategy = configure
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-86398-5
  - configure_strategy
  - file_groupowner_etc_ipsec_secrets
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Check that the root group is defined
  ansible.builtin.getent:
    database: group
    key: root
  ignore_errors: true
  when:
  - '"libreswan" in ansible_facts.packages'
  - file_groupowner_etc_ipsec_secrets_newgroup is undefined
  tags:
  - CCE-86398-5
  - configure_strategy
  - file_groupowner_etc_ipsec_secrets
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Set the file_groupowner_etc_ipsec_secrets_newgroup variable if root found
  ansible.builtin.set_fact:
    file_groupowner_etc_ipsec_secrets_newgroup: root
  when:
  - '"libreswan" in ansible_facts.packages'
  - ansible_facts.getent_group["root"] is defined
  tags:
  - CCE-86398-5
  - configure_strategy
  - file_groupowner_etc_ipsec_secrets
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Test for existence /etc/ipsec.secrets
  ansible.builtin.stat:
    path: /etc/ipsec.secrets
  register: file_exists
  when: '"libreswan" in ansible_facts.packages'
  tags:
  - CCE-86398-5
  - configure_strategy
  - file_groupowner_etc_ipsec_secrets
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Ensure group owner on /etc/ipsec.secrets
  ansible.builtin.file:
    path: /etc/ipsec.secrets
    follow: false
    group: '{{ file_groupowner_etc_ipsec_secrets_newgroup }}'
  when:
  - '"libreswan" in ansible_facts.packages'
  - file_exists.stat is defined and file_exists.stat.exists
  tags:
  - CCE-86398-5
  - configure_strategy
  - file_groupowner_etc_ipsec_secrets
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
