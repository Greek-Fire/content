# platform = multi_platform_all
# reboot = false
# strategy = configure
# complexity = low
# disruption = low
- name: Set the file_ownership_lastlog_newown variable if represented by uid
  ansible.builtin.set_fact:
    file_ownership_lastlog_newown: '0'
  tags:
  - NIST-800-53-SI-11(b)
  - NIST-800-53-SI-11(c)
  - NIST-800-53-SI-11.1(iv)
  - configure_strategy
  - file_ownership_lastlog
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Test for existence /usr/bin/lastlog
  ansible.builtin.stat:
    path: /usr/bin/lastlog
  register: file_exists
  tags:
  - NIST-800-53-SI-11(b)
  - NIST-800-53-SI-11(c)
  - NIST-800-53-SI-11.1(iv)
  - configure_strategy
  - file_ownership_lastlog
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Ensure owner on /usr/bin/lastlog
  ansible.builtin.file:
    path: /usr/bin/lastlog
    follow: false
    owner: '{{ file_ownership_lastlog_newown }}'
  when: file_exists.stat is defined and file_exists.stat.exists
  tags:
  - NIST-800-53-SI-11(b)
  - NIST-800-53-SI-11(c)
  - NIST-800-53-SI-11.1(iv)
  - configure_strategy
  - file_ownership_lastlog
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
