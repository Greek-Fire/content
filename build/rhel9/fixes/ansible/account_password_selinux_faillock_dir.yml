# platform = multi_platform_all
# reboot = false
# strategy = restrict
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-86249-0
  - DISA-STIG-RHEL-09-431020
  - NIST-800-53-AC-7 (a)
  - account_password_selinux_faillock_dir
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy

- name: An SELinux Context must be configured for the pam_faillock.so records directory
    - Get directories from faillock
  ansible.builtin.shell: grep -oP '^\s*(?:auth.*pam_faillock.so.*)?dir\s*=\s*(\S+)'
    "{{ item }}" | sed -r 's/.*=\s*(\S+)/\1/'
  register: faillock_output
  changed_when: false
  check_mode: false
  with_items:
  - /etc/security/faillock.conf
  - /etc/pam.d/system-auth
  - /etc/pam.d/password-auth
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-86249-0
  - DISA-STIG-RHEL-09-431020
  - NIST-800-53-AC-7 (a)
  - account_password_selinux_faillock_dir
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy

- name: An SELinux Context must be configured for the pam_faillock.so records directory
    - Create a list directories from faillock
  ansible.builtin.set_fact:
    list_faillock_dir: '{{ faillock_output.results | map(attribute=''stdout_lines'')
      | flatten }}'
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-86249-0
  - DISA-STIG-RHEL-09-431020
  - NIST-800-53-AC-7 (a)
  - account_password_selinux_faillock_dir
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy

- name: An SELinux Context must be configured for the pam_faillock.so records directory
    - Create directories for faillock
  ansible.builtin.file:
    path: '{{ item }}'
    state: directory
  with_items: '{{ list_faillock_dir }}'
  when:
  - '"kernel-core" in ansible_facts.packages'
  - item != ""
  tags:
  - CCE-86249-0
  - DISA-STIG-RHEL-09-431020
  - NIST-800-53-AC-7 (a)
  - account_password_selinux_faillock_dir
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy

- name: An SELinux Context must be configured for the pam_faillock.so records directory
    - Get SELinux context for faillock directories
  ansible.builtin.command: ls -dZ "{{ item }}"
  register: faillock_selinux_context
  changed_when: false
  check_mode: false
  with_items: '{{ list_faillock_dir }}'
  when:
  - '"kernel-core" in ansible_facts.packages'
  - item != ""
  tags:
  - CCE-86249-0
  - DISA-STIG-RHEL-09-431020
  - NIST-800-53-AC-7 (a)
  - account_password_selinux_faillock_dir
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy

- name: An SELinux Context must be configured for the pam_faillock.so records directory
    - Set up SELinux context for faillock
  ansible.builtin.shell: |-
    if ! semanage fcontext -a -t faillog_t "{{ item.item }}(/.*)?"; then
      semanage fcontext -m -t faillog_t "{{ item.item }}(/.*)?"
    fi
  with_items: '{{ faillock_selinux_context.results }}'
  when:
  - '"kernel-core" in ansible_facts.packages'
  - item.item != ""
  - item.stdout is defined
  - '"faillog_t" not in item.stdout'
  tags:
  - CCE-86249-0
  - DISA-STIG-RHEL-09-431020
  - NIST-800-53-AC-7 (a)
  - account_password_selinux_faillock_dir
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy

- name: An SELinux Context must be configured for the pam_faillock.so records directory
    - Restore SELinux context
  ansible.builtin.command: restorecon -R -v "{{ item.item }}"
  with_items: '{{ faillock_selinux_context.results }}'
  when:
  - '"kernel-core" in ansible_facts.packages'
  - item.item != ""
  - item.stdout is defined
  - '"faillog_t" not in item.stdout'
  tags:
  - CCE-86249-0
  - DISA-STIG-RHEL-09-431020
  - NIST-800-53-AC-7 (a)
  - account_password_selinux_faillock_dir
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy

- name: An SELinux Context must be configured for the pam_faillock.so records directory
    - Verify pam_faillock.so configuration
  ansible.builtin.debug:
    msg: |-
      "The pam_faillock.so dir option is not set in the system.
      If this is not expected, make sure pam_faillock.so is properly configured."
  when:
  - '"kernel-core" in ansible_facts.packages'
  - list_faillock_dir | length == 0
  tags:
  - CCE-86249-0
  - DISA-STIG-RHEL-09-431020
  - NIST-800-53-AC-7 (a)
  - account_password_selinux_faillock_dir
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy
