# platform = multi_platform_almalinux,multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_rhv,SUSE Linux Enterprise 15,SUSE Linux Enterprise 16
# reboot = false
# strategy = enable
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - enable_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - sebool_telepathy_tcp_connect_generic_network_ports

- name: Disable the telepathy_tcp_connect_generic_network_ports SELinux Boolean -
    Ensure python3-libsemanage Installed
  ansible.builtin.package:
    name: python3-libsemanage
    state: present
  when:
  - '"kernel-core" in ansible_facts.packages'
  - ( "kernel-core" in ansible_facts.packages and "rpm-ostree" in ansible_facts.packages
    and "bootc" in ansible_facts.packages and not "openshift-kubelet" in ansible_facts.packages
    and "ostree" in ansible_proc_cmdline or lookup("env", "container") == "bwrap-osbuild"
    or ansible_facts.selinux.status != "disabled" )
  tags:
  - enable_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - sebool_telepathy_tcp_connect_generic_network_ports
- (xccdf-var var_telepathy_tcp_connect_generic_network_ports)

- name: Disable the telepathy_tcp_connect_generic_network_ports SELinux Boolean -
    Set SELinux Boolean telepathy_tcp_connect_generic_network_ports Accordingly
  ansible.posix.seboolean:
    name: telepathy_tcp_connect_generic_network_ports
    state: '{{ var_telepathy_tcp_connect_generic_network_ports }}'
    persistent: true
  when:
  - '"kernel-core" in ansible_facts.packages'
  - ( "kernel-core" in ansible_facts.packages and "rpm-ostree" in ansible_facts.packages
    and "bootc" in ansible_facts.packages and not "openshift-kubelet" in ansible_facts.packages
    and "ostree" in ansible_proc_cmdline or lookup("env", "container") == "bwrap-osbuild"
    or ansible_facts.selinux.status != "disabled" )
  tags:
  - enable_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - sebool_telepathy_tcp_connect_generic_network_ports
