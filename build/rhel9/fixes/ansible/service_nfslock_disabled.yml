# platform = multi_platform_all
# reboot = false
# strategy = disable
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - disable_strategy
  - low_complexity
  - low_disruption
  - no_reboot_needed
  - service_nfslock_disabled
  - unknown_severity

- name: Disable Network File System Lock Service (nfslock) - Disable service nfslock
  block:

  - name: Disable Network File System Lock Service (nfslock) - Collect systemd Services
      Present in the System
    ansible.builtin.command: systemctl -q list-unit-files --type service
    register: service_exists
    changed_when: false
    failed_when: service_exists.rc not in [0, 1]
    check_mode: false

  - name: Disable Network File System Lock Service (nfslock) - Ensure nfslock.service
      is Masked
    ansible.builtin.systemd:
      name: nfslock.service
      state: stopped
      enabled: false
      masked: true
    when: service_exists.stdout_lines is search("nfslock.service", multiline=True)

  - name: Unit Socket Exists - nfslock.socket
    ansible.builtin.command: systemctl -q list-unit-files nfslock.socket
    register: socket_file_exists
    changed_when: false
    failed_when: socket_file_exists.rc not in [0, 1]
    check_mode: false

  - name: Disable Network File System Lock Service (nfslock) - Disable Socket nfslock
    ansible.builtin.systemd:
      name: nfslock.socket
      enabled: false
      state: stopped
      masked: true
    when: socket_file_exists.stdout_lines is search("nfslock.socket", multiline=True)
  tags:
  - disable_strategy
  - low_complexity
  - low_disruption
  - no_reboot_needed
  - service_nfslock_disabled
  - special_service_block
  - unknown_severity
  when: '"kernel-core" in ansible_facts.packages'
