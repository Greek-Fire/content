# platform = multi_platform_all
# reboot = false
# strategy = configure
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-86887-7
  - DISA-STIG-RHEL-09-232230
  - NIST-800-53-CM-6 b
  - configure_strategy
  - file_owner_cron_deny
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Set the file_owner_cron_deny_newown variable if represented by uid
  ansible.builtin.set_fact:
    file_owner_cron_deny_newown: '0'
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-86887-7
  - DISA-STIG-RHEL-09-232230
  - NIST-800-53-CM-6 b
  - configure_strategy
  - file_owner_cron_deny
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Test for existence /etc/cron.deny
  ansible.builtin.stat:
    path: /etc/cron.deny
  register: file_exists
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-86887-7
  - DISA-STIG-RHEL-09-232230
  - NIST-800-53-CM-6 b
  - configure_strategy
  - file_owner_cron_deny
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Ensure owner on /etc/cron.deny
  ansible.builtin.file:
    path: /etc/cron.deny
    follow: false
    owner: '{{ file_owner_cron_deny_newown }}'
  when:
  - '"kernel-core" in ansible_facts.packages'
  - file_exists.stat is defined and file_exists.stat.exists
  tags:
  - CCE-86887-7
  - DISA-STIG-RHEL-09-232230
  - NIST-800-53-CM-6 b
  - configure_strategy
  - file_owner_cron_deny
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
