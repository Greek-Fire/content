# platform = multi_platform_all
# reboot = false
# strategy = configure
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-86303-5
  - configure_strategy
  - directory_owner_etc_ipsecd
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Set the directory_owner_etc_ipsecd_newown variable if represented by uid
  ansible.builtin.set_fact:
    directory_owner_etc_ipsecd_newown: '0'
  when: '"libreswan" in ansible_facts.packages'
  tags:
  - CCE-86303-5
  - configure_strategy
  - directory_owner_etc_ipsecd
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Ensure owner on directory /etc/ipsec.d/
  ansible.builtin.file:
    path: /etc/ipsec.d/
    follow: false
    state: directory
    owner: '{{ directory_owner_etc_ipsecd_newown }}'
  when: '"libreswan" in ansible_facts.packages'
  tags:
  - CCE-86303-5
  - configure_strategy
  - directory_owner_etc_ipsecd
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
