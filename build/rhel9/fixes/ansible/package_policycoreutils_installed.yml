# platform = multi_platform_all
# reboot = false
# strategy = enable
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-84071-0
  - DISA-STIG-RHEL-09-431025
  - enable_strategy
  - low_complexity
  - low_disruption
  - low_severity
  - no_reboot_needed
  - package_policycoreutils_installed

- name: Ensure policycoreutils is installed
  ansible.builtin.package:
    name: policycoreutils
    state: present
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-84071-0
  - DISA-STIG-RHEL-09-431025
  - enable_strategy
  - low_complexity
  - low_disruption
  - low_severity
  - no_reboot_needed
  - package_policycoreutils_installed
