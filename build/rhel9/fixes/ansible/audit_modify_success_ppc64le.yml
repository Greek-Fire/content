# platform = multi_platform_all
# reboot = false
# strategy = restrict
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-90791-5
  - NIST-800-53-AU-2(a)
  - audit_modify_success_ppc64le
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy

- name: Put contents into /etc/audit/rules.d/30-ospp-v42-2-modify-success.rules according
    to policy
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/30-ospp-v42-2-modify-success.rules
    content: |
      ## Successful file modifications (open for write or truncate)
      -a always,exit -F arch=b64 -S openat,open_by_handle_at -F a2&01003 -F success=1 -F auid>=1000 -F auid!=unset -F key=successful-modification
      -a always,exit -F arch=b64 -S open -F a1&01003 -F success=1 -F auid>=1000 -F auid!=unset -F key=successful-modification
      -a always,exit -F arch=b64 -S truncate,ftruncate -F success=1 -F auid>=1000 -F auid!=unset -F key=successful-modification
    force: true
  when:
  - '"kernel-core" in ansible_facts.packages'
  - ansible_architecture == "ppc64le"
  tags:
  - CCE-90791-5
  - NIST-800-53-AU-2(a)
  - audit_modify_success_ppc64le
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy

- name: Configure auditing of successful file modifications (ppc64le) - Remove any
    permissions from group and other
  ansible.builtin.file:
    path: /etc/audit/rules.d/30-ospp-v42-2-modify-success.rules
    mode: g-rwx,o-rwx
    state: touch
  when:
  - '"kernel-core" in ansible_facts.packages'
  - ansible_architecture == "ppc64le"
  tags:
  - CCE-90791-5
  - NIST-800-53-AU-2(a)
  - audit_modify_success_ppc64le
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy
