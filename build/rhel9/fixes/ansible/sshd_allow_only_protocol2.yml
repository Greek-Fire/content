# platform = multi_platform_all
# reboot = false
# strategy = restrict
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-90812-9
  - CJIS-5.5.6
  - NIST-800-171-3.1.13
  - NIST-800-171-3.5.4
  - NIST-800-53-AC-17(2)
  - NIST-800-53-AC-17(a)
  - NIST-800-53-CM-6(a)
  - NIST-800-53-IA-5(1)(c)
  - NIST-800-53-MA-4(6)
  - NIST-800-53-SC-13
  - high_severity
  - low_complexity
  - low_disruption
  - no_reboot_needed
  - restrict_strategy
  - sshd_allow_only_protocol2

- name: Allow Only SSH Protocol 2 - Check if the parameter Protocol is configured
    in /etc/ssh/sshd_config
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: (?i)^\s*{{ "Protocol"| regex_escape }}\s+
    state: absent
  check_mode: true
  changed_when: false
  register: _config_file_has_parameter
  when:
  - '"kernel-core" in ansible_facts.packages'
  - '"openssh-server" in ansible_facts.packages and (((((ansible_facts.packages["openssh-server"]
    | last)["epoch"]) != None) | ternary((ansible_facts.packages["openssh-server"]
    | last)["epoch"] ~ ":", "0:")) + ((ansible_facts.packages["openssh-server"] |
    last)["version"] | split("-") | first)) is version("0:7.0", "<")'
  tags:
  - CCE-90812-9
  - CJIS-5.5.6
  - NIST-800-171-3.1.13
  - NIST-800-171-3.5.4
  - NIST-800-53-AC-17(2)
  - NIST-800-53-AC-17(a)
  - NIST-800-53-CM-6(a)
  - NIST-800-53-IA-5(1)(c)
  - NIST-800-53-MA-4(6)
  - NIST-800-53-SC-13
  - high_severity
  - low_complexity
  - low_disruption
  - no_reboot_needed
  - restrict_strategy
  - sshd_allow_only_protocol2

- name: Allow Only SSH Protocol 2 - Check if the parameter Protocol is configured
    in /etc/ssh/sshd_config.d
  ansible.builtin.find:
    paths:
    - /etc/ssh/sshd_config.d
    contains: (?i)^\s*{{ "Protocol"| regex_escape }}\s+
  register: _config_dir_has_parameter
  when:
  - '"kernel-core" in ansible_facts.packages'
  - '"openssh-server" in ansible_facts.packages and (((((ansible_facts.packages["openssh-server"]
    | last)["epoch"]) != None) | ternary((ansible_facts.packages["openssh-server"]
    | last)["epoch"] ~ ":", "0:")) + ((ansible_facts.packages["openssh-server"] |
    last)["version"] | split("-") | first)) is version("0:7.0", "<")'
  tags:
  - CCE-90812-9
  - CJIS-5.5.6
  - NIST-800-171-3.1.13
  - NIST-800-171-3.5.4
  - NIST-800-53-AC-17(2)
  - NIST-800-53-AC-17(a)
  - NIST-800-53-CM-6(a)
  - NIST-800-53-IA-5(1)(c)
  - NIST-800-53-MA-4(6)
  - NIST-800-53-SC-13
  - high_severity
  - low_complexity
  - low_disruption
  - no_reboot_needed
  - restrict_strategy
  - sshd_allow_only_protocol2

- name: Allow Only SSH Protocol 2 - Check if the parameter Protocol is configured
    correctly in /etc/ssh/sshd_config
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: (?i)^\s*{{ "Protocol"| regex_escape }}\s+2$
    state: absent
  check_mode: true
  changed_when: false
  register: _config_file_correctly
  when:
  - '"kernel-core" in ansible_facts.packages'
  - '"openssh-server" in ansible_facts.packages and (((((ansible_facts.packages["openssh-server"]
    | last)["epoch"]) != None) | ternary((ansible_facts.packages["openssh-server"]
    | last)["epoch"] ~ ":", "0:")) + ((ansible_facts.packages["openssh-server"] |
    last)["version"] | split("-") | first)) is version("0:7.0", "<")'
  tags:
  - CCE-90812-9
  - CJIS-5.5.6
  - NIST-800-171-3.1.13
  - NIST-800-171-3.5.4
  - NIST-800-53-AC-17(2)
  - NIST-800-53-AC-17(a)
  - NIST-800-53-CM-6(a)
  - NIST-800-53-IA-5(1)(c)
  - NIST-800-53-MA-4(6)
  - NIST-800-53-SC-13
  - high_severity
  - low_complexity
  - low_disruption
  - no_reboot_needed
  - restrict_strategy
  - sshd_allow_only_protocol2

- name: Allow Only SSH Protocol 2 - Check if the parameter Protocol is configured
    correctly in /etc/ssh/sshd_config.d
  ansible.builtin.find:
    paths:
    - /etc/ssh/sshd_config.d
    contains: (?i)^\s*{{ "Protocol"| regex_escape }}\s+2$
  register: _config_dir_correctly
  when:
  - '"kernel-core" in ansible_facts.packages'
  - '"openssh-server" in ansible_facts.packages and (((((ansible_facts.packages["openssh-server"]
    | last)["epoch"]) != None) | ternary((ansible_facts.packages["openssh-server"]
    | last)["epoch"] ~ ":", "0:")) + ((ansible_facts.packages["openssh-server"] |
    last)["version"] | split("-") | first)) is version("0:7.0", "<")'
  tags:
  - CCE-90812-9
  - CJIS-5.5.6
  - NIST-800-171-3.1.13
  - NIST-800-171-3.5.4
  - NIST-800-53-AC-17(2)
  - NIST-800-53-AC-17(a)
  - NIST-800-53-CM-6(a)
  - NIST-800-53-IA-5(1)(c)
  - NIST-800-53-MA-4(6)
  - NIST-800-53-SC-13
  - high_severity
  - low_complexity
  - low_disruption
  - no_reboot_needed
  - restrict_strategy
  - sshd_allow_only_protocol2

- name: Allow Only SSH Protocol 2
  block:

  - name: Deduplicate values from /etc/ssh/sshd_config
    ansible.builtin.lineinfile:
      path: /etc/ssh/sshd_config
      create: false
      regexp: (?i)(?i)^\s*{{ "Protocol"| regex_escape }}\s+
      state: absent

  - name: Check if /etc/ssh/sshd_config.d exists
    ansible.builtin.stat:
      path: /etc/ssh/sshd_config.d
    register: _etc_ssh_sshd_config_d_exists

  - name: Check if the parameter Protocol is present in /etc/ssh/sshd_config.d
    ansible.builtin.find:
      paths: /etc/ssh/sshd_config.d
      recurse: 'yes'
      follow: 'no'
      contains: (?i)^\s*{{ "Protocol"| regex_escape }}\s+
    register: _etc_ssh_sshd_config_d_has_parameter
    when: _etc_ssh_sshd_config_d_exists.stat.isdir is defined and _etc_ssh_sshd_config_d_exists.stat.isdir

  - name: Remove parameter from files in /etc/ssh/sshd_config.d
    ansible.builtin.lineinfile:
      path: '{{ item.path }}'
      create: false
      regexp: (?i)(?i)^\s*{{ "Protocol"| regex_escape }}\s+
      state: absent
    with_items: '{{ _etc_ssh_sshd_config_d_has_parameter.files | default([]) }}'
    when: _etc_ssh_sshd_config_d_has_parameter.matched > 0

  - name: Insert correct line to /etc/ssh/sshd_config.d/00-complianceascode-hardening.conf
    ansible.builtin.lineinfile:
      path: /etc/ssh/sshd_config.d/00-complianceascode-hardening.conf
      create: true
      regexp: (?i)(?i)^\s*{{ "Protocol"| regex_escape }}\s+
      line: Protocol 2
      state: present
      insertbefore: BOF
      validate: /usr/sbin/sshd -t -f %s
  when:
  - '"kernel-core" in ansible_facts.packages'
  - '"openssh-server" in ansible_facts.packages and (((((ansible_facts.packages["openssh-server"]
    | last)["epoch"]) != None) | ternary((ansible_facts.packages["openssh-server"]
    | last)["epoch"] ~ ":", "0:")) + ((ansible_facts.packages["openssh-server"] |
    last)["version"] | split("-") | first)) is version("0:7.0", "<")'
  - (_config_file_correctly.found == 0 and _config_dir_correctly.matched == 0) or
    ((_config_file_has_parameter.found | int) + (_config_dir_has_parameter.matched
    | int)) != 1
  tags:
  - CCE-90812-9
  - CJIS-5.5.6
  - NIST-800-171-3.1.13
  - NIST-800-171-3.5.4
  - NIST-800-53-AC-17(2)
  - NIST-800-53-AC-17(a)
  - NIST-800-53-CM-6(a)
  - NIST-800-53-IA-5(1)(c)
  - NIST-800-53-MA-4(6)
  - NIST-800-53-SC-13
  - high_severity
  - low_complexity
  - low_disruption
  - no_reboot_needed
  - restrict_strategy
  - sshd_allow_only_protocol2

- name: Allow Only SSH Protocol 2 - set file mode for /etc/ssh/sshd_config.d/00-complianceascode-hardening.conf
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d/00-complianceascode-hardening.conf
    mode: '0600'
    state: touch
    modification_time: preserve
    access_time: preserve
  when:
  - '"kernel-core" in ansible_facts.packages'
  - '"openssh-server" in ansible_facts.packages and (((((ansible_facts.packages["openssh-server"]
    | last)["epoch"]) != None) | ternary((ansible_facts.packages["openssh-server"]
    | last)["epoch"] ~ ":", "0:")) + ((ansible_facts.packages["openssh-server"] |
    last)["version"] | split("-") | first)) is version("0:7.0", "<")'
  tags:
  - CCE-90812-9
  - CJIS-5.5.6
  - NIST-800-171-3.1.13
  - NIST-800-171-3.5.4
  - NIST-800-53-AC-17(2)
  - NIST-800-53-AC-17(a)
  - NIST-800-53-CM-6(a)
  - NIST-800-53-IA-5(1)(c)
  - NIST-800-53-MA-4(6)
  - NIST-800-53-SC-13
  - high_severity
  - low_complexity
  - low_disruption
  - no_reboot_needed
  - restrict_strategy
  - sshd_allow_only_protocol2
