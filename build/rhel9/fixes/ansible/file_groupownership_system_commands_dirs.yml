# platform = multi_platform_fedora,multi_platform_ol,multi_platform_rhel,multi_platform_sle,multi_platform_slmicro,multi_platform_almalinux
# reboot = false
# strategy = restrict
# complexity = medium
# disruption = medium
- name: Verify that system commands files are group owned by root or a system account
    - Find system command files with incorrect group ownership
  ansible.builtin.find:
    paths: '{{ item }}'
    file_type: file
    follow: false
    recurse: false
  register: system_command_files_found
  with_items:
  - /bin
  - /sbin
  - /usr/bin
  - /usr/sbin
  - /usr/local/bin
  - /usr/local/sbin
  changed_when: false
  tags:
  - CCE-89442-8
  - DISA-STIG-RHEL-09-232195
  - NIST-800-53-CM-5(6)
  - NIST-800-53-CM-5(6).1
  - file_groupownership_system_commands_dirs
  - medium_complexity
  - medium_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy

- name: Verify that system commands files are group owned by root or a system account
    - Set group ownership to root for system command files
  ansible.builtin.file:
    path: '{{ item.path }}'
    group: root
  with_items: '{{ system_command_files_found.results | map(attribute=''files'') |
    flatten | rejectattr(''gr_name'', ''equalto'', ''root'') | list }}'
  tags:
  - CCE-89442-8
  - DISA-STIG-RHEL-09-232195
  - NIST-800-53-CM-5(6)
  - NIST-800-53-CM-5(6).1
  - file_groupownership_system_commands_dirs
  - medium_complexity
  - medium_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy
