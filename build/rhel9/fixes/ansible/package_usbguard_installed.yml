# platform = multi_platform_all
# reboot = false
# strategy = enable
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-84203-9
  - DISA-STIG-RHEL-09-291015
  - NIST-800-53-CM-8(3)
  - NIST-800-53-IA-3
  - enable_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - package_usbguard_installed

- name: Ensure usbguard is installed
  ansible.builtin.package:
    name: usbguard
    state: present
  when: ( ansible_architecture != "s390x" and "kernel-core" in ansible_facts.packages
    )
  tags:
  - CCE-84203-9
  - DISA-STIG-RHEL-09-291015
  - NIST-800-53-CM-8(3)
  - NIST-800-53-IA-3
  - enable_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - package_usbguard_installed
