# platform = multi_platform_all
# reboot = false
# strategy = configure
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - configure_strategy
  - file_groupowner_journalctl
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Set the file_groupowner_journalctl_newgroup variable if represented by gid
  ansible.builtin.set_fact:
    file_groupowner_journalctl_newgroup: '0'
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - configure_strategy
  - file_groupowner_journalctl
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Test for existence /usr/bin/journalctl
  ansible.builtin.stat:
    path: /usr/bin/journalctl
  register: file_exists
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - configure_strategy
  - file_groupowner_journalctl
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Ensure group owner on /usr/bin/journalctl
  ansible.builtin.file:
    path: /usr/bin/journalctl
    follow: false
    group: '{{ file_groupowner_journalctl_newgroup }}'
  when:
  - '"kernel-core" in ansible_facts.packages'
  - file_exists.stat is defined and file_exists.stat.exists
  tags:
  - configure_strategy
  - file_groupowner_journalctl
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
