# platform = multi_platform_all
# reboot = false
# strategy = configure
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-86374-6
  - configure_strategy
  - file_groupowner_etc_chrony_keys
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Check that the chrony group is defined
  ansible.builtin.getent:
    database: group
    key: chrony
  ignore_errors: true
  when:
  - '"kernel-core" in ansible_facts.packages'
  - file_groupowner_etc_chrony_keys_newgroup is undefined
  tags:
  - CCE-86374-6
  - configure_strategy
  - file_groupowner_etc_chrony_keys
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Set the file_groupowner_etc_chrony_keys_newgroup variable if chrony found
  ansible.builtin.set_fact:
    file_groupowner_etc_chrony_keys_newgroup: chrony
  when:
  - '"kernel-core" in ansible_facts.packages'
  - ansible_facts.getent_group["chrony"] is defined
  tags:
  - CCE-86374-6
  - configure_strategy
  - file_groupowner_etc_chrony_keys
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Test for existence /etc/chrony.keys
  ansible.builtin.stat:
    path: /etc/chrony.keys
  register: file_exists
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-86374-6
  - configure_strategy
  - file_groupowner_etc_chrony_keys
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Ensure group owner on /etc/chrony.keys
  ansible.builtin.file:
    path: /etc/chrony.keys
    follow: false
    group: '{{ file_groupowner_etc_chrony_keys_newgroup }}'
  when:
  - '"kernel-core" in ansible_facts.packages'
  - file_exists.stat is defined and file_exists.stat.exists
  tags:
  - CCE-86374-6
  - configure_strategy
  - file_groupowner_etc_chrony_keys
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
