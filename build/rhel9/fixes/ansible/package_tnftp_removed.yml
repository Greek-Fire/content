# platform = multi_platform_all
# reboot = false
# strategy = disable
# complexity = low
# disruption = low
- name: 'Remove tnftp Package: Ensure tnftp is removed'
  ansible.builtin.package:
    name: tnftp
    state: absent
  tags:
  - disable_strategy
  - low_complexity
  - low_disruption
  - low_severity
  - no_reboot_needed
  - package_tnftp_removed
