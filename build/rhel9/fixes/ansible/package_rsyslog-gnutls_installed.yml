# platform = multi_platform_all
# reboot = false
# strategy = enable
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-83987-8
  - DISA-STIG-RHEL-09-652015
  - enable_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - package_rsyslog-gnutls_installed

- name: Ensure rsyslog-gnutls is installed
  ansible.builtin.package:
    name: rsyslog-gnutls
    state: present
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-83987-8
  - DISA-STIG-RHEL-09-652015
  - enable_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - package_rsyslog-gnutls_installed
