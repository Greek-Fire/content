# platform = multi_platform_rhel,multi_platform_rhv,multi_platform_sle,multi_platform_slmicro,multi_platform_debian
# reboot = false
# strategy = configure
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-90826-9
  - DISA-STIG-RHEL-09-653125
  - NIST-800-53-CM-6(a)
  - configure_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - postfix_client_configure_mail_alias
- (xccdf-var var_postfix_root_mail_alias)

- name: Configure System to Forward All Mail For The Root Account - Make sure that
    "/etc/aliases" has a defined value for root
  ansible.builtin.lineinfile:
    path: /etc/aliases
    line: 'root: {{ var_postfix_root_mail_alias }}'
    regexp: ^(?:[rR][oO][oO][tT]|"[rR][oO][oO][tT]")\s*:\s*(.+)$
    create: true
    state: present
  register: aliases_root_mail_alias_changed
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-90826-9
  - DISA-STIG-RHEL-09-653125
  - NIST-800-53-CM-6(a)
  - configure_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - postfix_client_configure_mail_alias

- name: Configure System to Forward All Mail For The Root Account - Check if newaliases
    command is available
  ansible.builtin.stat:
    path: /usr/bin/newaliases
  register: result_newaliases_present
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-90826-9
  - DISA-STIG-RHEL-09-653125
  - NIST-800-53-CM-6(a)
  - configure_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - postfix_client_configure_mail_alias

- name: Configure System to Forward All Mail For The Root Account - Update postfix
    aliases
  ansible.builtin.command:
    cmd: newaliases
  when:
  - '"kernel-core" in ansible_facts.packages'
  - aliases_root_mail_alias_changed is changed
  - result_newaliases_present.stat.exists
  tags:
  - CCE-90826-9
  - DISA-STIG-RHEL-09-653125
  - NIST-800-53-CM-6(a)
  - configure_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - postfix_client_configure_mail_alias
