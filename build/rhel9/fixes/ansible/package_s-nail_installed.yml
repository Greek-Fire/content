# platform = multi_platform_all
# reboot = false
# strategy = enable
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-86608-7
  - DISA-STIG-RHEL-09-215095
  - NIST-800-53-CM-3(5)
  - enable_strategy
  - low_complexity
