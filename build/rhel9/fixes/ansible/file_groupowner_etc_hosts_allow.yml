# platform = multi_platform_all
# reboot = false
# strategy = configure
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - configure_strategy
  - file_groupowner_etc_hosts_allow
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Set the file_groupowner_etc_hosts_allow_newgroup variable if represented by
    gid
  ansible.builtin.set_fact:
    file_groupowner_etc_hosts_allow_newgroup: '0'
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - configure_strategy
  - file_groupowner_etc_hosts_allow
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Test for existence /etc/hosts.allow
  ansible.builtin.stat:
    path: /etc/hosts.allow
  register: file_exists
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - configure_strategy
  - file_groupowner_etc_hosts_allow
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed

- name: Ensure group owner on /etc/hosts.allow
  ansible.builtin.file:
    path: /etc/hosts.allow
    follow: false
    group: '{{ file_groupowner_etc_hosts_allow_newgroup }}'
  when:
  - '"kernel-core" in ansible_facts.packages'
  - file_exists.stat is defined and file_exists.stat.exists
  tags:
  - configure_strategy
  - file_groupowner_etc_hosts_allow
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
