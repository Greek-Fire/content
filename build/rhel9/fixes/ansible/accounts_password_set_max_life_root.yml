# platform = multi_platform_rhel,multi_platform_sle
# reboot = false
# strategy = restrict
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-87668-0
  - accounts_password_set_max_life_root
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy
- (xccdf-var var_accounts_maximum_age_root)

- name: Change the maximum time period between password changes
  ansible.builtin.user:
    user: root
    password_expire_max: '{{ var_accounts_maximum_age_root }}'
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-87668-0
  - accounts_password_set_max_life_root
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy
