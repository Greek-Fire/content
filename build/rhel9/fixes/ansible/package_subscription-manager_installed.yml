# platform = multi_platform_all
# reboot = false
# strategy = enable
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-83506-6
  - DISA-STIG-RHEL-09-215010
  - enable_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - package_subscription-manager_installed

- name: Ensure subscription-manager is installed
  ansible.builtin.package:
    name: subscription-manager
    state: present
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-83506-6
  - DISA-STIG-RHEL-09-215010
  - enable_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - package_subscription-manager_installed
