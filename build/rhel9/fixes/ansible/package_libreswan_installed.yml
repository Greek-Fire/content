# platform = multi_platform_all
# reboot = false
# strategy = enable
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-84068-6
  - DISA-STIG-RHEL-09-252065
  - NIST-800-53-CM-6(a)
  - PCI-DSS-Req-4.1
  - enable_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - package_libreswan_installed

- name: Ensure libreswan is installed
  ansible.builtin.package:
    name: libreswan
    state: present
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-84068-6
  - DISA-STIG-RHEL-09-252065
  - NIST-800-53-CM-6(a)
  - PCI-DSS-Req-4.1
  - enable_strategy
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - package_libreswan_installed
