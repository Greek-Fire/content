# platform = multi_platform_all
# reboot = false
# strategy = restrict
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - disable_weak_deps
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy

- name: Disable Installation of Weak Dependencies in DNF - Disable weak dependencies
  community.general.ini_file:
    path: /etc/dnf/dnf.conf
    section: main
    option: install_weak_deps
    value: 0
    create: true
    state: present
  when: '"dnf" in ansible_facts.packages'
  tags:
  - disable_weak_deps
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - restrict_strategy
