# platform = multi_platform_all
# reboot = false
# strategy = configure
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-86584-0
  - configure_strategy
  - file_groupowner_systemmap
  - low_complexity
  - low_disruption
  - low_severity
  - no_reboot_needed

- name: Check that the root group is defined
  ansible.builtin.getent:
    database: group
    key: root
  ignore_errors: true
  when:
  - '"kernel-core" in ansible_facts.packages'
  - file_groupowner_systemmap_newgroup is undefined
  tags:
  - CCE-86584-0
  - configure_strategy
  - file_groupowner_systemmap
  - low_complexity
  - low_disruption
  - low_severity
  - no_reboot_needed

- name: Set the file_groupowner_systemmap_newgroup variable if root found
  ansible.builtin.set_fact:
    file_groupowner_systemmap_newgroup: root
  when:
  - '"kernel-core" in ansible_facts.packages'
  - ansible_facts.getent_group["root"] is defined
  tags:
  - CCE-86584-0
  - configure_strategy
  - file_groupowner_systemmap
  - low_complexity
  - low_disruption
  - low_severity
  - no_reboot_needed

- name: Find /boot/ file(s) matching ^.*System\.map.*$
  ansible.builtin.command: find -P /boot/ -maxdepth 1 -type f  ! -group root -regextype
    posix-extended -regex "^.*System\.map.*$"
  register: files_found
  changed_when: false
  failed_when: false
  check_mode: false
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-86584-0
  - configure_strategy
  - file_groupowner_systemmap
  - low_complexity
  - low_disruption
  - low_severity
  - no_reboot_needed

- name: Ensure group owner on /boot/ file(s) matching ^.*System\.map.*$
  ansible.builtin.file:
    path: '{{ item }}'
    follow: false
    group: '{{ file_groupowner_systemmap_newgroup }}'
    state: file
  with_items:
  - '{{ files_found.stdout_lines }}'
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-86584-0
  - configure_strategy
  - file_groupowner_systemmap
  - low_complexity
  - low_disruption
  - low_severity
  - no_reboot_needed
