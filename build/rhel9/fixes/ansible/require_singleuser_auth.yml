# platform = multi_platform_all
# reboot = false
# strategy = restrict
# complexity = low
# disruption = low
- name: Gather the package facts
  package_facts:
    manager: auto
  tags:
  - CCE-83594-2
  - DISA-STIG-RHEL-09-611200
  - NIST-800-171-3.1.1
  - NIST-800-171-3.4.5
  - NIST-800-53-AC-3
  - NIST-800-53-CM-6(a)
  - NIST-800-53-IA-2
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - require_singleuser_auth
  - restrict_strategy

- name: Require Authentication for Single User Mode - find files which already override
    Execstart of rescue.service
  ansible.builtin.find:
    paths: /etc/systemd/system/rescue.service.d
    patterns: '*.conf'
    contains: ^\s*ExecStart=.*$
  register: rescue_service_overrides_found
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-83594-2
  - DISA-STIG-RHEL-09-611200
  - NIST-800-171-3.1.1
  - NIST-800-171-3.4.5
  - NIST-800-53-AC-3
  - NIST-800-53-CM-6(a)
  - NIST-800-53-IA-2
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - require_singleuser_auth
  - restrict_strategy

- name: Require Authentication for Single User Mode - set files containing ExecStart
    overrides as target
  ansible.builtin.set_fact:
    rescue_service_remediation_target_file: '{{ rescue_service_overrides_found.files
      | map(attribute=''path'') | list }}'
  when:
  - '"kernel-core" in ansible_facts.packages'
  - rescue_service_overrides_found.matched is defined and rescue_service_overrides_found.matched
    > 0
  tags:
  - CCE-83594-2
  - DISA-STIG-RHEL-09-611200
  - NIST-800-171-3.1.1
  - NIST-800-171-3.4.5
  - NIST-800-53-AC-3
  - NIST-800-53-CM-6(a)
  - NIST-800-53-IA-2
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - require_singleuser_auth
  - restrict_strategy

- name: Require Authentication for Single User Mode - set default target for rescue.service
    override
  ansible.builtin.set_fact:
    rescue_service_remediation_target_file:
    - /etc/systemd/system/rescue.service.d/10-oscap.conf
  when:
  - '"kernel-core" in ansible_facts.packages'
  - rescue_service_overrides_found.matched is defined and rescue_service_overrides_found.matched
    == 0
  tags:
  - CCE-83594-2
  - DISA-STIG-RHEL-09-611200
  - NIST-800-171-3.1.1
  - NIST-800-171-3.4.5
  - NIST-800-53-AC-3
  - NIST-800-53-CM-6(a)
  - NIST-800-53-IA-2
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - require_singleuser_auth
  - restrict_strategy

- name: Require Authentication for Single User Mode - Require emergency user mode
    password
  community.general.ini_file:
    path: '{{ item }}'
    section: Service
    option: ExecStart
    values:
    - ''
    - -/usr/lib/systemd/systemd-sulogin-shell rescue
  loop: '{{ rescue_service_remediation_target_file }}'
  when: '"kernel-core" in ansible_facts.packages'
  tags:
  - CCE-83594-2
  - DISA-STIG-RHEL-09-611200
  - NIST-800-171-3.1.1
  - NIST-800-171-3.4.5
  - NIST-800-53-AC-3
  - NIST-800-53-CM-6(a)
  - NIST-800-53-IA-2
  - low_complexity
  - low_disruption
  - medium_severity
  - no_reboot_needed
  - require_singleuser_auth
  - restrict_strategy
